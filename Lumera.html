        : <p className="text-sm text-muted">Add your own line items — pet care, childcare, hobbies, tuition — and they’ll fold into the matching bucket above.</p>}
    </Card>
  </AppShell>;
}

/* ============================================================
   PAGE · SAVINGS GOALS
   ============================================================ */
function monthsUntil(ym){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-1,1); const now=new Date(2026,4,31); return Math.max(1, Math.round((d-now)/(1000*60*60*24*30))); }
function goalImage(g){ const n=(g.name||'').toLowerCase();
  const kw = /japan/.test(n)?'japan,tokyo': /switzerl/.test(n)?'switzerland,alps': /\bcar\b|vehicle/.test(n)?'sports,car': /house|home|deposit|property|flat|apartment/.test(n)?'modern,house': /univers|college|tuition|education|school/.test(n)?'university,campus': /travel|holiday|trip|vacation|flight/.test(n)?'travel,landscape': /retire/.test(n)?'beach,sunset': /invest|portfolio|stock|wealth/.test(n)?'finance,city': /emergency|safety|rainy/.test(n)?'umbrella,rain': /wedding/.test(n)?'wedding': /baby|child|family/.test(n)?'family': 'mountain,goal';
  let lock=0; for(let i=0;i<n.length;i++) lock=(lock+n.charCodeAt(i))%997;
  return `https://loremflickr.com/640/300/${encodeURIComponent(kw)}?lock=${lock||7}`; }
function Goals(){
  const app = useApp(); const fmt = app.fmt; const m = app.metrics;
  const [goals,setGoals]=useState(()=>{
    const ef=Math.max(Math.round(m.essentialsTotal*3),5000);
    const list=[{id:'gEF', name:'Emergency fund', target:ef, current:app.balances.emergencyFund||0, deadline:'2026-12', priority:'High', icon:'shield'}];
    const map={ 'Home deposit':{name:'Home deposit', target:150000, icon:'home'}, 'A big purchase':{name:'Big purchase', target:20000, icon:'bag'}, 'Travel':{name:'Travel fund', target:12000, icon:'plane'}, 'Investing':{name:'Investment starter', target:20000, icon:'chart'}, 'Retirement':{name:'Retirement boost', target:50000, icon:'umbrella'} };
    const g=app.profile.savingsGoal; if(g && g!=='Emergency fund' && map[g]) list.push({id:'gP', ...map[g], current:0, deadline:'2028-06', priority:'Medium'});
    return list;
  });
  const [show,setShow]=useState(false); const [draft,setDraft]=useState({name:'',target:10000,current:0,deadline:'2027-06',priority:'Medium',icon:'target'});
  const add=()=>{ if(!draft.name) return; setGoals(g=>[...g,{...draft,id:'g'+Date.now()}]); setShow(false); setDraft({name:'',target:10000,current:0,deadline:'2027-06',priority:'Medium',icon:'target'}); };
  return <AppShell>
    <PageHead eyebrow="Savings goals" title="Give every dirham a destination."
      desc="Named goals you can feel progress toward. Lumera works out exactly what to set aside each month."
      action={<Btn variant="gold" icon="plus" onClick={()=>setShow(s=>!s)}>New goal</Btn>}/>
    {show && <Card className="mb-4 anim-fadeUp"><div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <label className="block"><span className="text-sm text-charcoal/85 mb-1.5 block">Goal name</span><input value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))} placeholder="e.g. New laptop" className="w-full rounded-xl border border-line bg-cream px-3 py-2.5 focus:border-gold focus:outline-none"/></label>
      <NumberField id="target" label="Target amount" value={draft.target} onChange={(k,v)=>setDraft(d=>({...d,target:v}))}/>
      <NumberField id="current" label="Already saved" value={draft.current} onChange={(k,v)=>setDraft(d=>({...d,current:v}))}/>
      <label className="block"><span className="text-sm text-charcoal/85 mb-1.5 block">Target date</span><input type="month" value={draft.deadline} onChange={e=>setDraft(d=>({...d,deadline:e.target.value}))} className="w-full rounded-xl border border-line bg-cream px-3 py-2.5 focus:border-gold focus:outline-none"/></label>
    </div><div className="flex gap-2 mt-4"><Btn variant="gold" onClick={add}>Add goal</Btn><Btn variant="ghost" onClick={()=>setShow(false)}>Cancel</Btn></div></Card>}
    <div className="grid sm:grid-cols-2 gap-4">
      {goals.map(g=>{ const pct=clamp(g.current/g.target*100,0,100); const mo=monthsUntil(g.deadline); const need=Math.max(0,(g.target-g.current)/mo); const done=pct>=100;
        return <Card key={g.id} hover className="relative overflow-hidden !p-0">
          <div className="relative h-28 bg-sand">
            <img src={g.img||goalImage(g)} alt="" className="h-full w-full object-cover" loading="lazy" onError={e=>{e.target.style.display='none';}}/>
            <div className="absolute inset-0 bg-gradient-to-t from-charcoal/65 via-charcoal/10 to-transparent"/>
            <span className="absolute top-2 left-2 grid place-items-center h-8 w-8 rounded-lg bg-cream/85 text-goldd backdrop-blur"><Icon name={done?'trophy':g.icon} size={16}/></span>
            <label className="absolute top-2 right-2 grid place-items-center h-8 w-8 rounded-lg bg-cream/85 text-charcoal cursor-pointer hover:bg-cream backdrop-blur" title="Upload your own image">
              <Icon name="plus" size={15}/>
              <input type="file" accept="image/*" className="hidden" onChange={e=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>setGoals(gs=>gs.map(x=>x.id===g.id?{...x,img:r.result}:x)); r.readAsDataURL(f); }}/>
            </label>
            <div className="absolute bottom-2 left-3 right-3 flex items-end justify-between gap-2">
              <h3 className="font-serif text-lg text-cream leading-tight truncate" style={{textShadow:'0 1px 6px rgba(0,0,0,.5)'}}>{g.name}</h3>
              <Pill tone={g.priority==='High'?'clay':'neutral'}>{g.priority}</Pill></div>
          </div>
          <div className="p-5 pt-4">
            <div className="text-sm text-muted tnum">{fmt.money(g.current)} <span className="text-faint">of {fmt.money(g.target)}</span></div>
            <div className="mt-3"><div className="flex justify-between text-xs text-faint mb-1"><span className="tnum">{round(pct)}%</span><span>{mo} months left</span></div><ProgressBar value={pct} tone={done?'sage':'gold'} height={9}/></div>
            <div className="mt-3 rounded-lg bg-sand/60 px-3 py-2 text-sm flex items-center justify-between">
              <span className="text-muted">Set aside / month</span><span className="font-semibold text-charcoal tnum">{done?'Complete 🎉':fmt.money(need)}</span></div>
            <div className="mt-2 text-[11px] text-goldd flex items-start gap-1.5"><Icon name="spark" size={12} className="mt-0.5"/>{done?'Goal reached — roll it into investing.':need>app.metrics.realistic?`Tight on timeline — extend the date or redirect part of your ${fmt.money(app.metrics.realistic)} savings opportunity.`:`Achievable within your current savings opportunity.`}</div>
          </div>
        </Card>; })}
    </div>
  </AppShell>;
}

/* ============================================================
   PAGE · EMERGENCY FUND CALCULATOR
   ============================================================ */
function Emergency(){
  const app = useApp(); const fmt = app.fmt; const m = app.metrics;
  const [ess,setEss]=useState(Math.round(m.essentialsTotal));
  const [stability,setStability]=useState('Stable'); const [deps,setDeps]=useState(app.profile.dependents); const [debt,setDebt]=useState(m.debtTotal/m.income>0.12?'High':'Low');
  const recMonths = useMemo(()=>{ let mo=3; if(stability==='Unstable')mo+=3; else if(stability==='Somewhat stable')mo+=1.5; if(deps>0)mo+=Math.min(3,deps*1.5); if(debt==='High')mo+=1.5; return clamp(Math.round(mo),3,12); },[stability,deps,debt]);
  const [months,setMonths]=useState(recMonths);
  useEffect(()=>setMonths(recMonths),[recMonths]);
  const target=ess*months; const current=app.balances.emergencyFund; const gap=Math.max(0,target-current);
  const perMonth = gap>0? gap/12:0;
  return <AppShell>
    <PageHead eyebrow="Emergency fund calculator" title="Know your true safety number."
      desc="An emergency fund is the foundation everything else rests on. Let’s size yours for your real life."/>
    <div className="grid lg:grid-cols-2 gap-4">
      <Card><Eyebrow className="mb-4">Your situation</Eyebrow>
        <div className="space-y-4">
          <NumberField id="ess" label="Monthly essential expenses" value={ess} onChange={(k,v)=>setEss(v)} icon="home"/>
          <div><div className="text-sm font-medium text-charcoal mb-2">Job stability</div><div className="flex flex-wrap gap-2">{['Very stable','Stable','Somewhat stable','Unstable'].map(o=><button key={o} onClick={()=>setStability(o)} className={cx('rounded-full px-3.5 py-1.5 text-sm border transition',stability===o?'border-gold bg-gold/10 text-goldd':'border-line bg-cream hover:bg-sand')}>{o}</button>)}</div></div>
          <div><div className="text-sm font-medium text-charcoal mb-2">Dependents</div><div className="flex items-center gap-3">
            <button onClick={()=>setDeps(d=>clamp(d-1,0,8))} className="grid place-items-center h-10 w-10 rounded-xl border border-line bg-cream hover:bg-sand"><Icon name="minus" size={16}/></button>
            <span className="font-serif text-2xl w-8 text-center tnum">{deps}</span>
            <button onClick={()=>setDeps(d=>clamp(d+1,0,8))} className="grid place-items-center h-10 w-10 rounded-xl border border-line bg-cream hover:bg-sand"><Icon name="plus" size={16}/></button></div></div>
          <div><div className="text-sm font-medium text-charcoal mb-2">Debt level</div><div className="flex gap-2">{['Low','Moderate','High'].map(o=><button key={o} onClick={()=>setDebt(o)} className={cx('rounded-full px-3.5 py-1.5 text-sm border transition',debt===o?'border-gold bg-gold/10 text-goldd':'border-line bg-cream hover:bg-sand')}>{o}</button>)}</div></div>
        </div>
      </Card>
      <div className="space-y-4">
        <Card className="bg-gradient-to-br from-gold/8 to-transparent">
          <Eyebrow className="mb-2">Recommended buffer</Eyebrow>
          <div className="flex items-end gap-3"><span className="font-serif text-5xl text-charcoal tnum">{months}</span><span className="text-muted mb-2">months of essentials</span></div>
          <div className="mt-3"><LuxSlider value={months} min={3} max={12} step={1} onChange={setMonths} fmt={v=>v+' mo'}/></div>
          <div className="flex gap-2 mt-2">{[3,6,9,12].map(x=><button key={x} onClick={()=>setMonths(x)} className={cx('flex-1 rounded-lg py-1.5 text-xs border transition',months===x?'border-gold bg-gold/10 text-goldd':'border-line text-muted hover:bg-sand')}>{x} mo</button>)}</div>
          <p className="text-xs text-faint mt-2">Suggested: {recMonths} months for your stability, dependents and debt.</p>
        </Card>
        <div className="grid grid-cols-3 gap-3">
          <Card hover={false} className="!p-4"><div className="text-xs text-muted">Current</div><div className="font-serif text-xl text-charcoal tnum"><AnimatedNumber value={current} money/></div></Card>
          <Card hover={false} className="!p-4"><div className="text-xs text-muted">Target</div><div className="font-serif text-xl text-goldd tnum"><AnimatedNumber value={target} money/></div></Card>
          <Card hover={false} className="!p-4"><div className="text-xs text-muted">Gap</div><div className="font-serif text-xl text-clayd tnum"><AnimatedNumber value={gap} money/></div></Card>
        </div>
        <Card><div className="flex items-center justify-between"><div><div className="text-sm text-muted">To close the gap in 12 months</div><div className="font-serif text-2xl text-saged tnum">{fmt.money(perMonth)}<span className="text-sm text-muted">/mo</span></div>
          <div className="text-xs text-faint mt-1">Currently covers <b className="text-charcoal/70">{(current/(ess||1)).toFixed(1)} months</b> of essentials · {round(clamp(current/target*100,0,100))}% of target</div></div>
          <ScoreRing value={clamp(current/target*100,0,100)} size={92} stroke={9} label="% funded" color={COLORS.sage}/></div>
          <p className="text-xs text-goldd mt-3 flex items-start gap-1.5"><Icon name="spark" size={13} className="mt-0.5"/>{perMonth<=m.realistic?`Within reach — your savings opportunity is ${fmt.money(m.realistic)}/mo.`:`Stretch the timeline or combine with reclaimed spending of ${fmt.money(m.realistic)}/mo.`}</p>
          <p className="text-[11px] text-muted mt-2 flex items-start gap-1.5"><Icon name="info" size={12} className="mt-0.5 shrink-0"/>Cash can lose a little to <Term>Inflation</Term> over time, but an emergency fund’s job is safety and instant access — not growth. Keep it liquid.</p>
        </Card>
      </div>
    </div>
  </AppShell>;
}

/* ============================================================
   PAGE · SUBSCRIPTION WASTE DETECTOR
   ============================================================ */
function Subscriptions(){
  const app = useApp(); const fmt = app.fmt;
  const MIG={keep:'active',cancel:'cancelled'};
  const [subs,setSubs]=useState(()=>{ try{ const s=JSON.parse(localStorage.getItem('lumera_subs')); const arr=(Array.isArray(s)&&s.length)?s:SEED_SUBS; return arr.map(x=>({...x, verdict:MIG[x.verdict]||x.verdict})); }catch(e){ return SEED_SUBS; } });
  useEffect(()=>{ try{ localStorage.setItem('lumera_subs', JSON.stringify(subs)); }catch(e){} },[subs]);
  const setVerdict=(id,v)=>setSubs(s=>s.map(x=>x.id===id?{...x,verdict:v}:x));
  const removeSub=(id)=>setSubs(s=>s.filter(x=>x.id!==id));
  const SUB_CATS=['Streaming','Music','Software','News','Fitness','Gaming','Cloud','Other'];
  const [showAdd,setShowAdd]=useState(false);
  const [nsub,setNsub]=useState({name:'',cost:0,freq:'Monthly',category:'Streaming'});
  const addSub=()=>{ if(!nsub.name||!Number(nsub.cost)) return; setSubs(s=>[...s,{id:'s'+Date.now(), name:nsub.name, cost:Number(nsub.cost), freq:nsub.freq, category:nsub.category, verdict:'active'}]); setNsub({name:'',cost:0,freq:'Monthly',category:'Streaming'}); setShowAdd(false); };
  const total=sum(subs.map(s=>s.cost));
  const unused=sum(subs.filter(s=>s.freq==='Never'||s.freq==='Rarely').map(s=>s.cost));
  const toCancel=subs.filter(s=>s.verdict==='cancelled'||s.verdict==='paused'); const cancelSum=sum(toCancel.map(s=>s.cost));
  const kept=total-cancelSum; const toReview=subs.filter(s=>s.verdict==='review');
  const freqTone={Daily:'sage',Weekly:'sage',Monthly:'neutral',Rarely:'clay',Never:'berry'};
  return <AppShell>
    <PageHead eyebrow="Subscription waste detector" title="Find the leaks you forgot you’re paying."
      desc="The quiet renewals add up faster than any single big purchase. Decide keep, review, or cancel."
      action={<button onClick={()=>setShowAdd(s=>!s)} className="btn btn-gold px-3 py-2 text-sm"><Icon name="plus" size={14}/>Add subscription</button>}/>
    {showAdd && <Card className="mb-4 anim-fadeUp"><Eyebrow className="mb-3">Add a subscription</Eyebrow>
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <label className="block"><span className="text-xs text-charcoal/85 mb-1 block">Name</span><input value={nsub.name} onChange={e=>setNsub(s=>({...s,name:e.target.value}))} placeholder="e.g. Disney+" className="w-full rounded-lg border border-line bg-card px-3 py-2 text-sm focus:border-gold focus:outline-none"/></label>
        <NumberField id="cost" label="Cost / month" value={nsub.cost} onChange={(k,v)=>setNsub(s=>({...s,cost:v}))}/>
        <label className="block"><span className="text-xs text-charcoal/85 mb-1 block">Category</span><select value={nsub.category} onChange={e=>setNsub(s=>({...s,category:e.target.value}))} className="w-full rounded-lg border border-line bg-card px-3 py-2 text-sm focus:border-gold focus:outline-none">{SUB_CATS.map(o=><option key={o}>{o}</option>)}</select></label>
        <label className="block"><span className="text-xs text-charcoal/85 mb-1 block">How often you use it</span><select value={nsub.freq} onChange={e=>setNsub(s=>({...s,freq:e.target.value}))} className="w-full rounded-lg border border-line bg-card px-3 py-2 text-sm focus:border-gold focus:outline-none">{['Daily','Weekly','Monthly','Rarely','Never'].map(o=><option key={o}>{o}</option>)}</select></label>
      </div>
      <div className="flex gap-2 mt-3"><Btn variant="gold" onClick={addSub}>Add subscription</Btn><Btn variant="ghost" onClick={()=>setShowAdd(false)}>Cancel</Btn></div>
    </Card>}
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
      {[['Current / month',total,'charcoal','What you pay today'],['After your changes',kept,'sage','If you cancel the marked'],['Monthly saved',cancelSum,'berry','From cancellations'],['Annual saved',cancelSum*12,'gold','Per year']].map(([l,v,t,d])=>
        <Card key={l} hover={false} className="!p-4"><div className="text-xs text-muted">{l}</div><div className="font-serif text-xl mt-0.5 tnum" style={{color:t==='charcoal'?COLORS.charcoal:COLORS[t]}}><AnimatedNumber value={v} money/></div><div className="text-[11px] text-faint mt-0.5">{d}</div></Card>)}
    </div>
    <Card><div className="space-y-2.5">
      {subs.map(s=>{ const save=s.alt?Math.max(0,s.cost-s.alt.cost):0; return <div key={s.id} className="rounded-xl border border-line bg-cream/60 p-3">
        <div className="flex flex-wrap items-center gap-3">
          <span className="grid place-items-center h-9 w-9 rounded-lg bg-sand text-goldd shrink-0 overflow-hidden">
            {s.domain ? <img src={`https://logo.clearbit.com/${s.domain}`} alt="" className="h-6 w-6 object-contain" onError={e=>{ e.target.style.display='none'; if(e.target.nextSibling) e.target.nextSibling.style.display='block'; }}/> : null}

            s.verdict===v?(v==='active'?'border-sage bg-sage/12 text-saged':v==='cancelled'?'border-berry bg-berry/12 text-berry':v==='paused'?'border-sky bg-sky/12 text-sky':'border-gold bg-gold/12 text-goldd'):'border-line bg-card text-muted hover:bg-sand')}>{v}</button>)}

        </div>
        {s.alt && <div className="mt-2 flex items-start gap-2 rounded-lg bg-gold/8 px-3 py-2 text-xs"><Icon name="bulb" size={13} className="text-goldd mt-0.5 shrink-0"/><span className="text-charcoal/80"><b>Cheaper option:</b> {s.alt.name} — {s.alt.cost>0?`${fmt.money(s.alt.cost)}/mo`:'free'}{save>0&&<> · save <b className="text-saged">{fmt.money(save)}/mo</b> ({fmt.money(save*12)}/yr)</>}</span></div>}
      </div>; })}
    </div>
    {cancelSum>0 && <div className="mt-4 rounded-xl bg-charcoal text-cream px-4 py-3 flex items-start gap-2 text-sm"><Icon name="spark" size={16} className="text-gold mt-0.5"/>Cancelling {toCancel.length} subscription{toCancel.length>1?'s':''} drops your monthly bill from <b className="text-gold">{fmt.money(total)}</b> to <b className="text-gold">{fmt.money(kept)}</b> — saving <b className="text-gold">{fmt.money(cancelSum*12)}</b> a year, which invested could grow far more.</div>}
    </Card>
    {toReview.length>0 && <Card className="mt-4"><Eyebrow className="mb-3">Review list <span className="normal-case tracking-normal text-faint font-normal">· reminders optional</span></Eyebrow>
      <div className="space-y-2">{toReview.map(s=><div key={s.id} className="flex items-center gap-3 rounded-xl border border-line bg-cream/60 p-3">
        <Icon name="bell" size={16} className="text-goldd shrink-0"/><div className="flex-1 text-sm"><b className="text-charcoal">{s.name}</b> <span className="text-muted">· {fmt.money(s.cost)}/mo{s.renew?` · renews ${s.renew}`:''}</span></div>

    </Card>}
    <Card className="mt-4"><Eyebrow className="mb-3">General money-saving tactics</Eyebrow>

        {[['Rotate streaming','Keep one streaming service at a time and rotate monthly instead of paying for several at once.','tv'],

function simulateDebts(debts, extra, strategy){
  let list=debts.map(d=>({...d})); let months=0, interest=0; const cap=600;
  const order=()=> strategy==='avalanche'? [...list].sort((a,b)=>b.rate-a.rate) : [...list].sort((a,b)=>a.balance-b.balance);
  while(list.some(d=>d.balance>0.5) && months<cap){
    months++; let pool=extra;
    list.forEach(d=>{ if(d.balance<=0)return; const i=d.balance*(d.rate/100/12); interest+=i; d.balance+=i; });
    list.forEach(d=>{ if(d.balance<=0)return; const pay=Math.min(d.balance,d.min); d.balance-=pay; });
    for(const d of order()){ if(pool<=0)break; if(d.balance<=0)continue; const pay=Math.min(d.balance,pool); d.balance-=pay; pool-=pay; }
  }
  return { months, interest:Math.round(interest) };
}

        {(()=>{ const steps=activePath.topics; const doneN=steps.filter(t=>done[activePath.level+t]).length; return <Fragment>
          <ProgressBar value={doneN/steps.length*100} tone="gold" className="my-4"/>
          <div className="text-[11px] tracking-[.16em] uppercase text-faint mb-2">Lessons — watch or read, then tick off</div>
          <div className="space-y-2">{steps.map((t,i)=>{ const k=activePath.level+t; const d=done[k];
            return <div key={t} className="flex items-center gap-2.5 rounded-xl border border-line bg-cream/60 p-3">
              <button onClick={()=>setDone(s=>({...s,[k]:!s[k]}))} className={cx('grid place-items-center h-7 w-7 rounded-full border shrink-0', d?'bg-saged border-saged text-cream':'border-taupe text-muted')}>{d?<Icon name="check" size={15}/>:<span className="text-xs">{i+1}</span>}</button>
              <div className="flex-1 text-sm font-medium" style={{textDecoration:d?'line-through':'none', color:d?'#9C9387':'#272320'}}>{t}</div>
              <a href={vidUrl(topicKey(t)||'invest', app.lang)} target="_blank" rel="noopener noreferrer" className="text-xs text-goldd flex items-center gap-1"><Icon name="play" size={12}/>Watch</a>
              <a href={`https://www.investopedia.com/search?q=${encodeURIComponent(t)}`} target="_blank" rel="noopener noreferrer" className="text-xs text-sky flex items-center gap-1"><Icon name="book" size={12}/>Read</a>
            </div>; })}</div>
          {activePath.quiz && <Fragment><div className="text-[11px] tracking-[.16em] uppercase text-faint mb-2 mt-4">Practice check — self-test, tap to reveal</div>
          <div className="space-y-2">{activePath.quiz.map((qa,i)=><details key={i} className="group rounded-xl border border-line bg-cream/60 p-3 [&_summary]:cursor-pointer"><summary className="list-none flex items-center justify-between text-sm text-charcoal gap-2"><span>{i+1}. {qa[0]}</span><Icon name="chevron" size={14} className="text-faint rotate-90 group-open:rotate-[270deg] transition shrink-0"/></summary><div className="mt-2 text-sm text-saged flex items-center gap-1.5"><Icon name="check" size={14}/>{qa[1]}</div></details>)}</div>
          <a href="https://www.khanacademy.org/college-careers-more/personal-finance" target="_blank" rel="noopener noreferrer" className="mt-2 inline-flex items-center gap-1.5 text-xs text-goldd font-medium"><Icon name="cap" size={13}/>Take a graded quiz on Khan Academy (free)</a></Fragment>}
          {doneN===steps.length ? <div className="mt-4 rounded-xl bg-sage/10 text-saged text-sm px-4 py-3 flex items-center gap-2"><Icon name="trophy" size={16}/>Path complete — you’ve earned the Lifelong Learner badge.</div>
            : <p className="text-xs text-faint mt-3">Watch or read each lesson, tick it off, then test yourself with the quiz. Finish all {steps.length} to earn the badge.</p>}
        </Fragment>; })()}
      </div>
    </div>}
    <div className="mt-4"><Disclaimer compact/></div>
  </AppShell>;
}

function Pricing(){

  const tiers=[
    {name:'Free',price:'Free',sub:'Available today',tone:false,cta:'Current plan',feats:['30-day expense review','Financial health score','Budget & savings tools','Emergency fund calculator','Market news & insights','Limited AI assistant'],note:'Everything you need to start understanding your money.'},

/* ============================================================
   GLOSSARY + jargon tooltip
   ============================================================ */
const GLOSSARY = {
  'HYSA':'High-Yield Savings Account — a savings account paying far more interest than a standard one, while keeping money safe and instantly accessible.',
  'ETF':'Exchange-Traded Fund — one fund holding many investments that trades like a stock. A low-cost way to diversify instantly.',
  'Index Fund':'A fund that tracks an entire market index (like the S&P 500) instead of trying to beat it. Low fees, broad diversification.',
  'Diversification':'Spreading money across many investments so no single loss can sink your portfolio.',
  'Volatility':'How much an investment’s price swings up and down. Higher volatility means bigger ups and downs.',
  'Credit Utilisation':'The share of your available credit you’re using. Keeping it under ~30% helps your credit score.',
  'Debt-to-Income Ratio':'Your monthly debt payments divided by monthly income. Lenders use it to judge how much you can safely borrow.',
  'Dollar-Cost Averaging':'Investing a fixed amount on a set schedule regardless of price — it smooths out market timing.',
  'Emergency Fund':'Cash set aside (3–6 months of essentials) for surprises, so you never have to sell investments in a panic.',
  'Compound Interest':'Earning returns on your past returns — growth that accelerates over time.',
  'APR':'Annual Percentage Rate — the yearly cost of borrowing, including interest and fees.',
  'Deductible':'The amount you pay out of pocket on an insurance claim before cover kicks in. A higher deductible usually lowers your premium.',
  'Premium':'The recurring amount you pay for an insurance policy.',
  'Asset Allocation':'How your money is split across asset types (stocks, bonds, cash) — the biggest driver of risk and return.',
  'Net Worth':'Everything you own (assets) minus everything you owe (liabilities).',
  'Dependent':'Someone who relies on your income — typically a child, elderly parent, or partner who isn’t earning. More dependents usually means a larger emergency fund.',
  'Hard inquiry':'A check on your credit report when you apply for new credit. A few are normal; many in a short time can temporarily lower your score.',
  'Asset':'Anything you own that has value — cash, savings, investments, property, a car.',
  'Liability':'Anything you owe — loans, credit-card balances, a mortgage.',
  'Inflation':'The gradual rise in prices over time, which slowly reduces what a fixed amount of cash can buy.',
  'Risk tolerance':'How much short-term ups and downs in value you can handle without panic-selling.',
  'Expense ratio':'The yearly fee a fund charges, as a percentage of your investment. Lower is better — broad index funds are often under 0.1%.',
  'Bond':'A loan you make to a government or company that pays you interest and returns the principal at the end. Generally steadier than stocks.',
  'Mutual Fund':'A professionally managed pool of money invested in many securities. Similar to an ETF, but priced once a day and sometimes higher-fee.',
  'Market Cap':'Market capitalisation — a company’s total share value (share price × number of shares). It tells you how large the company is.',
  'Dividend Yield':'The annual dividend a stock pays, as a percentage of its price. A 3% yield pays roughly 3% of your investment in cash each year.',
  'P/E Ratio':'Price-to-earnings ratio — share price divided by yearly earnings per share. A rough gauge of how expensive a stock is versus its profits.',
  'On-time payment rate':'The share of your bills and debt payments made on time. It’s the single biggest driver of your credit score — aim for 100%.',
  'Payment history':'Your track record of paying bills on time. Late or missed payments hurt your credit score the most and linger for years.',
  'Principal':'The original amount you borrowed or invested, before any interest is added.',
  'Liquidity':'How quickly something can be turned into cash without losing value. Cash is highly liquid; property is not.',
  'Dividend':'A share of a company’s profits paid out to shareholders, usually as cash every few months.',
  'Rebalancing':'Periodically adjusting your investments back to your target mix after some have grown faster than others.',
  'Benchmark':'A realistic reference range for a category, scaled to your income and region, so you can see what “normal” looks like.',
  'Savings rate':'The share of your income you save or invest each month. Higher is better — 15–20%+ is a strong target.',
  'Take-home income':'Your pay after tax and deductions — the money that actually lands in your account.',
  'Discretionary spending':'Non-essential “wants” like eating out, shopping and entertainment — the easiest place to find savings.',
  'Tax-aware investing':'Choosing accounts and timing to legally reduce the tax you pay on investment gains and income.',
  'IPO':'Initial Public Offering — the first time a company sells shares to the public. Often exciting but volatile and unproven.',
  'Watchlist':'A personal list of stocks or funds you want to follow without necessarily owning them.',
  'Debt-free date':'The month your debts reach zero if you keep paying at the current rate plus any extra.',
  'Yield Curve':'A line plotting interest rates of bonds across maturities. An “inverted” curve (short rates above long) has often preceded recessions.',
  'Alpha':'The return an investment earns above its benchmark — the value a manager or strategy adds beyond simply tracking the market.',
  'Beta':'How much an investment moves relative to the overall market. Beta 1 ≈ moves with the market; above 1 = more volatile; below 1 = calmer.',
  'Sharpe Ratio':'Return earned per unit of risk taken. Higher is better — it rewards smooth returns over a wild ride to the same place.',
  'Capital Gains':'The profit when you sell an asset for more than you paid. May be taxed; holding longer can mean a lower tax rate in some regions.',
  'Risk Premium':'The extra return investors demand for holding a riskier asset instead of a “safe” one like government bonds.',
  'Hedge':'An investment taken to offset potential losses in another — financial insurance that trades some upside for protection.',
  'CAGR':'Compound Annual Growth Rate — the smoothed yearly growth rate of an investment over a period, as if it grew steadily each year.',
  'Market Cycle':'The recurring pattern of markets rising (bull) and falling (bear) over time. Long-term investors ride through full cycles.',
  'Drawdown':'The drop from an investment’s peak to its lowest point before recovering. A “20% drawdown” means it fell 20% from its high.',
  'Interest Rate Arbitrage':'Profiting from differences in interest rates between markets or currencies — advanced and not without risk.',
  'Mutual fund':'A professionally managed pool of many investors’ money invested in a basket of securities; priced once daily.',
};

function Credit(){
  const app=useApp();
  const [util,setUtil]=useState(34); const [onTime,setOnTime]=useState(96); const [ageY,setAgeY]=useState(5); const [inq,setInq]=useState(2);
  const score = clamp(Math.round(300 + (1-util/100)*170 + (onTime/100)*250 + clamp(ageY/12,0,1)*110 + (4-clamp(inq,0,6))*12),300,850);
  const potential = clamp(score + (util>30?Math.round((util-30)*1.6):0) + (onTime<100?Math.round((100-onTime)*5):0),300,850);
  const band = score>=800?['Exceptional','sage']:score>=740?['Very good','sage']:score>=670?['Good','gold']:score>=580?['Fair','clay']:['Poor','berry'];
  const pct=((score-300)/550)*100;
  const plan=[
    {done:util<=30, t:'Get utilisation under 30%', d:`Your `, term:'Credit Utilisation', tail:` is ${util}%. Paying balances down before the statement date helps fast.`},
    {done:onTime>=99, t:'Never miss a payment', d:'On-time payments are the single biggest factor. Automate at least the minimum on every account.'},
    {done:ageY>=5, t:'Keep old accounts open', d:'Length of credit history helps — avoid closing your oldest card.'},
    {done:inq<=2, t:'Limit hard inquiries', d:'Space out new credit applications; each hard check can shave a few points.'},
  ];
  return <AppShell>
    <PageHead eyebrow="Credit optimisation" title="Build a score lenders compete over."
      desc="Understand exactly what moves your credit score, model changes, and follow a personalised plan. Educational — not a credit-reporting service."/>
    <div className="grid lg:grid-cols-3 gap-4 mb-4">
      <Card className="lg:col-span-1 text-center">
        <Eyebrow className="mb-2 justify-center">Estimated score</Eyebrow>
        <div className="font-serif text-6xl text-charcoal tnum leading-none"><AnimatedNumber value={score}/></div>
        <div className="text-sm text-faint mt-1">range 300–850</div>
        <div className="mt-3"><Pill tone={band[1]}>{band[0]}</Pill></div>
        <div className="mt-3"><ProgressBar value={pct} tone={band[1]} height={10}/></div>
        <div className="mt-4 rounded-xl bg-sage/8 p-3 text-sm"><span className="text-muted">Potential with the plan below</span><div className="font-serif text-2xl text-saged tnum">{potential} <span className="text-sm text-muted">(+{potential-score})</span></div></div>
      </Card>
      <Card className="lg:col-span-2">
        <Eyebrow className="mb-4">Model your profile</Eyebrow>
        <div className="space-y-5">
          <LuxSlider label={<>Credit utilisation</>} value={util} min={0} max={90} step={1} onChange={setUtil} fmt={v=>v+'%'}/>
          <LuxSlider label={<><Term>On-time payment rate</Term></>} value={onTime} min={70} max={100} step={1} onChange={setOnTime} fmt={v=>v+'%'}/>
          <LuxSlider label="Average account age" value={ageY} min={0} max={20} step={1} onChange={setAgeY} fmt={v=>v+' yrs'}/>
          <LuxSlider label={<><Term>Hard inquiry</Term> count (12 mo)</>} value={inq} min={0} max={8} step={1} onChange={setInq} fmt={v=>v+''}/>
        </div>
        <p className="text-xs text-faint mt-4 flex items-center gap-1.5"><Icon name="info" size={13}/>Lower <Term>Credit Utilisation</Term> and a high on-time rate move your score the most.</p>
      </Card>
    </div>
    <Card><Eyebrow className="mb-3">Your personalised improvement plan</Eyebrow>
      <div className="space-y-2.5">
        {plan.map((p,i)=><div key={i} className="flex items-start gap-3 rounded-xl border border-line bg-cream/60 p-3">
          <span className={cx('grid place-items-center h-7 w-7 rounded-full shrink-0', p.done?'bg-sage/15 text-saged':'bg-gold/15 text-goldd')}><Icon name={p.done?'check':'arrowR'} size={15}/></span>
          <div><div className="text-sm font-medium text-charcoal">{p.t}{p.done&&<span className="text-saged text-xs ml-2">Done</span>}</div>
            <p className="text-xs text-muted mt-0.5 leading-relaxed">{p.d}{p.term&&<Term>{p.term}</Term>}{p.tail}</p></div></div>)}
      </div>
    </Card>
    <div className="mt-4"><Disclaimer compact/></div>
  </AppShell>;
}

      for(let la=-60;la<=60;la+=30){ ctx.beginPath(); let st=false; for(let lo=-180;lo<=180;lo+=4){ const p=project(la,lo); if(p.vis){ st?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y); st=true; } else st=false; } ctx.stroke(); }
      ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.strokeStyle='rgba(198,160,74,0.45)'; ctx.lineWidth=1.5; ctx.stroke();

  '/budget':Budget, '/goals':Goals, '/emergency':Emergency, '/subscriptions':Subscriptions, '/debt':Debt,
  '/networth':NetWorth, '/learn':Learn, '/resources':KnowledgeHub, '/updates':Updates, '/pricing':Pricing, '/privacy':Privacy, '/settings':Settings,
  '/retirement':Retirement, '/globe':GlobalMarkets, '/world':WorldMonitor, '/hub':ProductHub,
  '/lumera':()=><ProductPage k="lumera"/>, '/leaf':()=><ProductPage k="leaf"/>, '/atlas':()=><ProductPage k="atlas"/>,
  '/shield':()=><ProductPage k="shield"/>, '/forge':()=><ProductPage k="forge"/>,
};

const STORE='lumera_v2';
const BLANK_EXP = Object.fromEntries(ITEMS.map(i=>[i.id,0]));
const BLANK_BAL = { emergencyFund:0, cashSavings:0, investmentsBal:0, propertyBal:0, carBal:0 };
const ACCT='lumera_accounts';
const loadAccounts=()=>{ try{ return JSON.parse(localStorage.getItem(ACCT))||{}; }catch(e){ return {}; } };
function App(){
  const [route,nav] = useHashRoute();
  const persisted = useMemo(()=>{ try{ return JSON.parse(localStorage.getItem(STORE))||{}; }catch(e){ return {}; } },[]);
  const [user,setUser] = useState(persisted.user||null);
  const [onboarded,setOnboarded] = useState(!!persisted.onboarded);
  const [profile,setProfile] = useState(persisted.profile||DEFAULT_PROFILE);
  const [expenses,setExpenses] = useState(persisted.expenses||DEFAULT_EXPENSES);
  const [balances,setBalances] = useState(persisted.balances||DEFAULT_BALANCES);
  const [lang,setLang] = useState(persisted.lang||'en');
  const [theme,setThemeState] = useState(()=>{ try{ return localStorage.getItem('lumera_theme')||'dark'; }catch(e){ return 'dark'; } });
  const [mode,setModeState] = useState(()=>{ try{ return localStorage.getItem('lumera_mode')||'spark'; }catch(e){ return 'spark'; } });
  // Spark-mode gamification (only surfaced when mode==='spark'; harmless otherwise)
  const [xp,setXp] = useState(()=>{ try{ return JSON.parse(localStorage.getItem('lumera_spark_xp'))||0; }catch(e){ return 0; } });
  const [quests,setQuests] = useState(()=>{ try{ const s=JSON.parse(localStorage.getItem('lumera_spark_quests'))||{}; const today=new Date().toISOString().slice(0,10); return (s.day===today&&s.list)?s.list:DEFAULT_QUESTS; }catch(e){ return DEFAULT_QUESTS; } });
  const [questBurst,setQuestBurst] = useState(0);
  const [mobileMenu,setMobileMenu] = useState(false);
  const [showLogout,setShowLogout] = useState(false);
  const [showWelcome,setShowWelcome] = useState(false);
  const [pendingProvider,setPendingProvider] = useState(null);
  const [lastUpdated,setLastUpdated] = useState(persisted.lastUpdated||0);
  const [lastPrompt,setLastPrompt] = useState(persisted.lastPrompt||0);
  const [fxTick,setFxTick] = useState(0);
  useEffect(()=>{ RATES.onLoad=()=>setFxTick(t=>t+1); RATES.refresh(); },[]);
  const fmt = useFmt(profile.currency, profile.baseCurrency||profile.currency);
  const metrics = useMemo(()=>deriveMetrics(profile,expenses,balances),[profile,expenses,balances]);

  const updateProfile = (patch)=> setProfile(p=>({...p,...patch}));
  const setRegion = (k)=> setProfile(p=>({...p, region:k, currency:REGIONS[k].currency}));
  const resetAll = ()=>{ setProfile(DEFAULT_PROFILE); setExpenses(DEFAULT_EXPENSES); setBalances(DEFAULT_BALANCES); };

  // ----- auth with per-account memory (client-side prototype) -----
  const loadInto=(acc)=>{ setProfile(acc.profile||DEFAULT_PROFILE); setExpenses(acc.expenses||{...BLANK_EXP}); setBalances(acc.balances||{...BLANK_BAL}); setOnboarded(!!acc.onboarded); setLastUpdated(acc.lastUpdated||0); setLastPrompt(acc.lastPrompt||0); };
  const signup=(name,email)=>{ email=email||'you@email.com'; const accts=loadAccounts();
    if(accts[email]){ return login(email); }
    const u={name:name||email.split('@')[0], email, isAdmin:/admin/i.test(email)};
    setUser(u); setOnboarded(false); setProfile({...DEFAULT_PROFILE, name:u.name}); setExpenses({...BLANK_EXP}); setBalances({...BLANK_BAL}); nav('/onboarding'); };
  const login=(email)=>{ email=email||'you@email.com'; const accts=loadAccounts(); const acc=accts[email];
    if(acc){ const u={name:acc.name||email.split('@')[0], email, isAdmin:!!acc.isAdmin||/admin/i.test(email)}; setUser(u); loadInto(acc);
      if(acc.onboarded){ const DAY=864e5; if(Date.now()-Math.max(acc.lastPrompt||0, acc.lastUpdated||0) > 30*DAY) setShowWelcome(true); nav('/dashboard'); } else nav('/onboarding'); }
    else { const u={name:email.split('@')[0], email, isAdmin:/admin/i.test(email)}; setUser(u); setOnboarded(false); setProfile({...DEFAULT_PROFILE,name:u.name}); setExpenses({...BLANK_EXP}); setBalances({...BLANK_BAL}); nav('/onboarding'); } };
  const loginProvider=(p)=> setPendingProvider(p);
  const completeProvider=()=>{ const p=pendingProvider; setPendingProvider(null); if(p) login(`${p}.user@lumera.app`); };
  const demo=()=>{ const accts=loadAccounts(); const e='demo@lumera.app';
    if(accts[e]){ login(e); } else { setUser({name:'Avyan', email:e, isAdmin:false}); setOnboarded(true); setProfile(DEFAULT_PROFILE); setExpenses(DEFAULT_EXPENSES); setBalances(DEFAULT_BALANCES); nav('/dashboard'); } };
  const askLogout=()=> setShowLogout(true);
  const doLogout=()=>{ setShowLogout(false); setUser(null); setOnboarded(false); nav('/'); };
  const completeOnboarding=()=>{ setOnboarded(true); setLastUpdated(Date.now()); setLastPrompt(Date.now()); };
  const checkIn=()=>{ setProfile(p=>{ const today=new Date().toISOString().slice(0,10); if(p.lastCheckin===today) return p; const y=new Date(Date.now()-864e5).toISOString().slice(0,10); const ns=(p.lastCheckin===y)?(p.streak||0)+1:1; return {...p, streak:ns, lastCheckin:today, streakBest:Math.max(p.streakBest||0,ns)}; }); };

  useEffect(()=>{ const L=LANGS.find(l=>l.code===lang)||LANGS[0]; document.documentElement.dir=L.dir; document.documentElement.lang=lang; },[lang]);
  // Theme: 'light' | 'dark' | 'system'. Apply to <html>, persist, and react to OS changes when on 'system'.
  const setTheme = useCallback((pref)=>{ setThemeState(pref); try{ localStorage.setItem('lumera_theme', pref); }catch(e){} },[]);
  useEffect(()=>{
    const apply=()=>{ const dark = theme==='dark' || (theme==='system' && matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark?'dark':'light');
      document.documentElement.setAttribute('data-theme-pref', theme);
      const tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute('content', dark?'#14110D':'#F6F2EB'); };
    apply();
    if(theme==='system'){ const mq=matchMedia('(prefers-color-scheme: dark)'); mq.addEventListener('change',apply); return ()=>mq.removeEventListener('change',apply); }
  },[theme]);
  // Spark mode: 'classic' | 'spark'. Re-themes accents (via CSS) and surfaces the gamification layer.
  const setMode = useCallback((m)=>{ setModeState(m); try{ localStorage.setItem('lumera_mode', m); }catch(e){} },[]);
  useEffect(()=>{ document.documentElement.setAttribute('data-mode', mode==='spark'?'spark':'classic'); },[mode]);
  // Sub-product sites (Leaf.html, Atlas.html, …) boot straight into their world,
  // entering a demo if not already signed in (file:// storage isn't shared across files).
  useEffect(()=>{ if(SITE==='lumera') return;
    if(mode!=='spark') setMode('spark');
    if(!user) demo();
    const h=location.hash.replace('#',''); if(!h||h==='/'||h==='/dashboard') location.hash='/'+SITE;
  },[]);
  const awardXp = useCallback((n)=>{ setXp(x=>{ const v=x+(n||0); try{ localStorage.setItem('lumera_spark_xp', JSON.stringify(v)); }catch(e){} return v; }); setQuestBurst(b=>b+1); },[]);
  const completeQuest = useCallback((id)=>{ setQuests(qs=>{ const next=qs.map(q=>{ if(q.id===id&&!q.done){ awardXp(q.xp); return {...q,done:true}; } return q; });
    try{ localStorage.setItem('lumera_spark_quests', JSON.stringify({day:new Date().toISOString().slice(0,10), list:next})); }catch(e){} return next; }); },[awardXp]);
  useEffect(()=>{ LA.start({ lang, cur:profile.currency, user:user?user.email:'guest' }); },[]);
  useEffect(()=>{ LA.event('view',{ path:route.split('?')[0], user:user?user.email:'guest' }); },[route]);
  useEffect(()=>{ LA.event('lang',{ lang }); },[lang]);
  useEffect(()=>{ LA.event('currency',{ cur:profile.currency }); },[profile.currency]);
  useEffect(()=>{ _curLang=lang; ensureTrObserver(()=>_curLang); const id=setTimeout(()=>translateDOM(lang),60); return ()=>clearTimeout(id); },[lang,route]);
  useEffect(()=>{ const el=document.getElementById('loader'); if(el){ el.style.opacity='0'; setTimeout(()=>el.remove(),600);} },[]);
  useEffect(()=>{ setMobileMenu(false); },[route]);
  useEffect(()=>{ try{ localStorage.setItem(STORE, JSON.stringify({user,onboarded,profile,expenses,balances,lang,lastUpdated,lastPrompt}));
    if(user){ const a=loadAccounts(); a[user.email]={name:user.name,isAdmin:user.isAdmin,onboarded,profile,expenses,balances,lastUpdated,lastPrompt}; localStorage.setItem(ACCT, JSON.stringify(a)); }
  }catch(e){} },[user,onboarded,profile,expenses,balances,lang,lastUpdated,lastPrompt]);

  let path = route.split('?')[0]; if(!ROUTES[path]) path='/';
  const PUBLIC=['/','/login','/signup','/forgot','/pricing','/privacy'];
  const PREBOARD=['/onboarding','/review','/settings'];
  let redirect=null;
  if(!user && !PUBLIC.includes(path)) redirect='/login';
  else if(user && !onboarded && !PUBLIC.includes(path) && !PREBOARD.includes(path)) redirect='/onboarding';
  // Redirect synchronously so there is no blank-frame flash before navigation fires
  if(redirect && redirect!==route){ location.hash=redirect; }

  // Which sub-product "world" we're in — recolours the whole shell in Spark mode.
  const product = mode==='spark' ? productOf(path) : 'lumera';
  useEffect(()=>{ document.documentElement.setAttribute('data-product', product); },[product]);

  const value = { route, nav, user, signup, login, loginProvider, demo, logout:askLogout, askLogout, completeOnboarding, checkIn, onboarded,
    profile, updateProfile, setProfile, expenses, setExpenses, balances, setBalances,
    lang, setLang, theme, setTheme, mode, setMode, product, xp, quests, awardXp, completeQuest,
    setRegion, resetAll, fmt, metrics, mobileMenu, setMobileMenu, t: tfn(lang) };

  const Page = redirect ? (()=> null) : (ROUTES[path]||Landing);
  return <AppCtx.Provider value={value}>
    {mode==='spark' && <XPBurst fire={questBurst}/>}
    <div key={redirect||path} className="anim-fadeIn"><Page/></div>
    {showLogout && <div className="fixed inset-0 z-[150] grid place-items-center p-4">
      <div className="absolute inset-0 bg-charcoal/45" onClick={()=>setShowLogout(false)}/>
      <div className="relative w-full max-w-sm lux-card !p-6 text-center anim-scaleIn">
        <span className="mx-auto grid place-items-center h-12 w-12 rounded-2xl bg-clay/12 text-clayd mb-3"><Icon name="lock" size={22}/></span>
        <h3 className="font-serif text-xl text-charcoal">Log out of Lumera?</h3>
        <p className="text-sm text-muted mt-1">Your data is saved to this account — you can log back in anytime without redoing the quiz.</p>
        <div className="flex gap-2 mt-5"><button onClick={()=>setShowLogout(false)} className="btn btn-ghost flex-1 py-2.5 text-sm">Cancel</button>
          <button onClick={doLogout} className="btn flex-1 py-2.5 text-sm border border-berry/40 text-berry hover:bg-berry/5">Log out</button></div>
      </div>
    </div>}
    {showWelcome && <div className="fixed inset-0 z-[150] grid place-items-center p-4">
      <div className="absolute inset-0 bg-charcoal/45" onClick={()=>setShowWelcome(false)}/>
      <div className="relative w-full max-w-sm lux-card !p-6 text-center anim-scaleIn">
        <span className="mx-auto grid place-items-center h-12 w-12 rounded-2xl bg-gold/15 text-goldd mb-3"><Icon name="spark" size={22}/></span>
        <h3 className="font-serif text-xl text-charcoal">Welcome back, {profile.name||(user&&user.name)}.</h3>
        <p className="text-sm text-muted mt-1">Your finances are just as you left them. Would you like to update your latest values?</p>
        <div className="flex gap-2 mt-5"><button onClick={()=>{setShowWelcome(false); nav('/review');}} className="btn btn-gold flex-1 py-2.5 text-sm">Update now</button>
          <button onClick={()=>{setShowWelcome(false); setLastPrompt(Date.now());}} className="btn btn-ghost flex-1 py-2.5 text-sm">Continue to dashboard</button></div>
      </div>
    </div>}
    {pendingProvider && <div className="fixed inset-0 z-[160] grid place-items-center p-4">
      <div className="absolute inset-0 bg-charcoal/50" onClick={()=>setPendingProvider(null)}/>
      <div className="relative w-full max-w-sm bg-white rounded-xl3 shadow-lift overflow-hidden anim-scaleIn">
        <div className="px-6 py-4 border-b border-line flex items-center gap-2"><Icon name="globe" size={18} className="text-goldd"/><span className="font-medium text-charcoal capitalize">Sign in with {pendingProvider}</span></div>
        <div className="p-6">
          <div className="text-sm text-muted mb-3">Choose an account to continue to <b className="text-charcoal">Lumera</b>:</div>
          <button onClick={completeProvider} className="w-full flex items-center gap-3 rounded-xl border border-line p-3 hover:bg-sand transition text-left">
            <span className="grid place-items-center h-9 w-9 rounded-full bg-gradient-to-br from-gold to-goldd text-cream font-serif">{pendingProvider[0].toUpperCase()}</span>
            <span><span className="block text-sm font-medium text-charcoal capitalize">Continue as {pendingProvider} user</span><span className="block text-xs text-faint">{pendingProvider}.user@lumera.app</span></span>
          </button>
          <p className="text-[11px] text-faint mt-3 leading-relaxed">This is a prototype provider screen. Real {pendingProvider} OAuth is a drop-in — see <b>INTEGRATION.md → Step 1</b>. Lumera never sees your password.</p>
          <div className="flex gap-2 mt-4"><button onClick={()=>setPendingProvider(null)} className="btn btn-ghost flex-1 py-2.5 text-sm">Cancel</button><button onClick={completeProvider} className="btn btn-primary flex-1 py-2.5 text-sm">Continue</button></div>
        </div>
      </div>
    </div>}
  </AppCtx.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);

</script>
</body>
</html>
