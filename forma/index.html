<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FFFFFF" />
<title>FORMA — find your style DNA</title>
<meta name="description" content="FORMA is a personal style OS. Take a fast visual quiz, get your Style DNA, build your closet, and generate fits." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   FORMA — BRUTALIST STREETWEAR SYSTEM
   Pure white. Hard black. Loud red. Zero luxury.
   ============================================================ */
:root{
  --white:#FFFFFF;
  --ink:#0A0A0A;
  --red:#FF2D2D;
  --red-dark:#D81616;
  --gray:#6B6B6B;
  --line:#0A0A0A;
  --soft:#F2F2F2;

  --display:'Space Grotesk', system-ui, sans-serif;
  --mono:'Space Mono', ui-monospace, monospace;
  --ui:'Inter', system-ui, sans-serif;

  --bd:2px solid #0A0A0A;
  --sh:5px 5px 0 #0A0A0A;
  --sh-red:5px 5px 0 #FF2D2D;
  --nav-h:64px;
  --ease:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--white); color:var(--ink);
  font-family:var(--ui); line-height:1.45;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden; min-height:100vh;
}
img{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--red);color:#fff;}
input,textarea,select{font-family:inherit;}

/* ---- custom cursor (desktop, after first mouse move) ---- */
#cur,#curDot{position:fixed;z-index:9999;pointer-events:none;display:none;}
#cur{width:30px;height:30px;border:2px solid var(--red);border-radius:50%;transform:translate(-50%,-50%);
  transition:width .2s var(--ease),height .2s var(--ease),background .2s,border-radius .2s;}
#curDot{width:6px;height:6px;background:var(--ink);transform:translate(-50%,-50%);}
body.has-cursor #cur,body.has-cursor #curDot{display:block;}
body.has-cursor *{cursor:none !important;}
#cur.big{width:64px;height:64px;background:rgba(255,45,45,.08);}
#cur.tag{width:54px;height:54px;background:var(--red);border-radius:4px;}

/* ---- type helpers ---- */
.mono{font-family:var(--mono);}
.eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);}
.eyebrow.k{color:var(--ink);}
h1,h2,h3{font-family:var(--display);font-weight:700;letter-spacing:-.01em;line-height:.96;text-transform:uppercase;}
.mark{color:var(--red);}
.box-mark{background:var(--red);color:#fff;padding:0 .12em;display:inline-block;}
.muted{color:var(--gray);}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--display);font-weight:600;font-size:14px;letter-spacing:.02em;text-transform:uppercase;
  padding:14px 24px;border:var(--bd);background:var(--white);color:var(--ink);
  box-shadow:var(--sh);border-radius:0;
  transition:transform .12s var(--ease),box-shadow .12s var(--ease),background .15s,color .15s;}
.btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink);}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{box-shadow:7px 7px 0 var(--ink);}
.btn-block{width:100%;}
.btn-sm{padding:9px 16px;font-size:12px;box-shadow:3px 3px 0 var(--ink);}
.btn-sm:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink);}
.btn-ghost{border:none;box-shadow:none;padding:12px 6px;text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:2px;}
.btn-ghost:hover{transform:none;box-shadow:none;color:var(--red);}
.btn[disabled]{opacity:.35;pointer-events:none;}

/* ---- app shell ---- */
#app{min-height:100vh;}
.page{animation:pop .35s var(--ease) both;}
@keyframes pop{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.wrap{max-width:1320px;margin:0 auto;padding:0 24px;}
.section{padding:80px 0;}
.hr{height:2px;background:var(--ink);margin:48px 0;border:0;}

/* ---- nav ---- */
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  background:var(--white);border-bottom:var(--bd);}
.brand{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.brand::after{content:"";width:9px;height:9px;background:var(--red);border-radius:50%;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);padding:8px 12px;transition:color .15s;}
.nav-link:hover{color:var(--red);}
.nav-link.active{color:var(--red);}
@media(max-width:780px){.nav-links .hide-m{display:none;}.nav{padding:0 16px;}}

/* ---- bottom tabbar (mobile authed) ---- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:300;height:60px;padding-bottom:env(safe-area-inset-bottom);
  display:none;align-items:center;justify-content:space-around;background:var(--white);border-top:var(--bd);}
.tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink);padding:6px 8px;}
.tabbar button.active{color:var(--red);}
.tabbar svg{width:20px;height:20px;}
body.authed .tabbar{display:flex;}
@media(min-width:781px){body.authed .tabbar{display:none;}}

/* ============================================================
   HOMEPAGE
   ============================================================ */
.hero{padding-top:var(--nav-h);border-bottom:var(--bd);}
.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;}
.hero-copy{padding:60px 48px 60px 24px;border-right:var(--bd);display:flex;flex-direction:column;justify-content:center;}
.hero-copy h1{font-size:clamp(46px,8vw,104px);margin:22px 0 26px;}
.hero-copy p{font-size:17px;max-width:440px;color:var(--ink);margin-bottom:34px;}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;}
.hero-meta{margin-top:40px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);}
.hero-art{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;}
.hero-art .cell{position:relative;border-bottom:var(--bd);border-right:var(--bd);overflow:hidden;min-height:170px;}
.hero-art .cell:nth-child(2n){border-right:none;}
.hero-art .cell .ph{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .9s var(--ease);}
.hero-art .cell:hover .ph{transform:scale(1.08);}
.hero-art .cell .tg{position:absolute;bottom:10px;left:10px;background:var(--white);border:var(--bd);font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;padding:4px 8px;z-index:1;}
.hero-art .cell .num{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;z-index:1;}
@media(max-width:860px){.hero-grid{grid-template-columns:1fr;}.hero-copy{border-right:none;border-bottom:var(--bd);padding:40px 24px;}.hero-art{grid-template-columns:1fr 1fr;}}

/* ticker */
.ticker-wrap{overflow:hidden;background:var(--ink);padding:12px 0;}
.ticker{display:flex;white-space:nowrap;animation:tick 24s linear infinite;}
.ticker:hover{animation-play-state:paused;}
.ticker span{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:#fff;padding:0 26px;}
.ticker span.r{color:var(--red);}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* how it works */
.how{display:grid;grid-template-columns:repeat(3,1fr);border:var(--bd);}
.how .step{padding:38px 30px;border-right:var(--bd);}
.how .step:last-child{border-right:none;}
.how .step .n{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--red);}
.how .step h3{font-size:30px;margin:16px 0 12px;}
.how .step p{color:var(--gray);font-size:15px;}
@media(max-width:780px){.how{grid-template-columns:1fr;}.how .step{border-right:none;border-bottom:var(--bd);}.how .step:last-child{border-bottom:none;}}

/* manifesto */
.manifesto{font-family:var(--display);font-weight:700;text-transform:uppercase;font-size:clamp(30px,5.5vw,72px);line-height:1;letter-spacing:-.01em;}
.manifesto .mark{color:var(--red);}

/* proof chips */
.proof{display:flex;gap:0;flex-wrap:wrap;border:var(--bd);}
.dna-chip{padding:22px 26px;border-right:var(--bd);flex:1;min-width:220px;}
.dna-chip:last-child{border-right:none;}
.dna-chip .name{font-family:var(--display);font-weight:700;font-size:22px;text-transform:uppercase;}
.dna-chip .pct{font-family:var(--mono);font-size:12px;color:var(--red);margin-top:6px;font-weight:700;}

/* footer */
.foot{border-top:var(--bd);padding:40px 0 110px;}
.foot-cols{display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;font-family:var(--mono);font-size:12px;text-transform:uppercase;color:var(--gray);}
.foot .brand{color:var(--ink);}

/* reveal */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
.reveal.in{opacity:1;transform:none;}

/* ============================================================
   QUIZ
   ============================================================ */
.quiz{min-height:100vh;display:flex;flex-direction:column;padding-top:var(--nav-h);}
.quiz-top{max-width:820px;width:100%;margin:0 auto;padding:20px 24px 0;}
.qbar{display:flex;gap:4px;}
.qbar .seg{flex:1;height:8px;background:var(--white);border:var(--bd);transition:background .3s;}
.qbar .seg.done{background:var(--ink);}
.qbar .seg.active{background:var(--red);}
.qcount{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-top:10px;text-align:center;}
.quiz-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 24px 40px;}
.q-card{max-width:900px;width:100%;animation:qin .35s var(--ease) both;}
.q-card.out{animation:qout .25s var(--ease) both;}
@keyframes qin{from{opacity:0;transform:translateX(34px);}to{opacity:1;transform:none;}}
@keyframes qout{to{opacity:0;transform:translateX(-34px);}}
.q-head{margin-bottom:30px;}
.q-head .eyebrow{display:block;margin-bottom:14px;}
.q-head h2{font-size:clamp(30px,5vw,52px);}
.q-head p{font-family:var(--mono);color:var(--gray);margin-top:12px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;}

.tile-grid{display:grid;gap:14px;}
.tile-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.tile-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.tile-grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:680px){.tile-grid.cols-3,.tile-grid.cols-4{grid-template-columns:repeat(2,1fr);}}

.choice{position:relative;border:var(--bd);background:var(--soft);overflow:hidden;aspect-ratio:4/5;
  background-size:cover;background-position:center;
  box-shadow:var(--sh);transition:transform .14s var(--ease),box-shadow .14s var(--ease);}
.choice:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--ink);}
.choice.sel{box-shadow:6px 6px 0 var(--red);transform:translate(-2px,-2px);}
.choice.sel{outline:3px solid var(--red);outline-offset:-3px;}
.choice .cap{position:absolute;left:0;right:0;bottom:0;padding:14px 12px;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;
  background:var(--white);border-top:var(--bd);}
.choice .check{position:absolute;top:8px;right:8px;width:28px;height:28px;background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.4);transition:all .2s var(--ease);}
.choice.sel .check{opacity:1;transform:none;}
.choice.swatch{aspect-ratio:1/1;}

/* slider */
.slider-wrap{max-width:600px;margin:0 auto;text-align:center;border:var(--bd);box-shadow:var(--sh);padding:40px 30px;}
.slider-val{font-family:var(--display);font-weight:700;font-size:72px;color:var(--red);line-height:1;}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--ink);margin-top:24px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;background:var(--red);cursor:pointer;border:var(--bd);}
input[type=range]::-moz-range-thumb{width:30px;height:30px;background:var(--red);cursor:pointer;border:var(--bd);border-radius:0;}
.slider-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray);margin-top:16px;}

.quiz-foot{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;gap:14px;
  max-width:900px;margin:0 auto;width:100%;padding:16px 24px calc(16px + env(safe-area-inset-bottom));
  background:var(--white);border-top:var(--bd);}
.q-back{font-family:var(--mono);font-weight:700;font-size:12px;text-transform:uppercase;color:var(--ink);display:flex;align-items:center;gap:8px;}
.q-back:hover{color:var(--red);}

/* ============================================================
   RESULT
   ============================================================ */
.result{min-height:100vh;padding:calc(var(--nav-h) + 40px) 24px 120px;}
.result-inner{max-width:780px;margin:0 auto;}
.result .lead .eyebrow{display:block;margin-bottom:18px;}
.result h1.primary{font-size:clamp(44px,9vw,108px);}
.result h1.primary .mark{display:block;}
.dna-bars{display:flex;flex-direction:column;gap:0;margin:40px 0;border:var(--bd);}
.dna-row{padding:18px 20px;border-bottom:var(--bd);}
.dna-row:last-child{border-bottom:none;}
.dna-row .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.dna-row .nm{font-family:var(--display);font-weight:700;font-size:20px;text-transform:uppercase;}
.dna-row .pc{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--red);}
.bar{height:14px;background:var(--white);border:var(--bd);overflow:hidden;}
.bar>i{display:block;height:100%;width:0;background:var(--red);transition:width 1.1s var(--ease);}
.dna-summary{font-family:var(--mono);font-size:14px;line-height:1.6;text-transform:uppercase;letter-spacing:.02em;border-left:6px solid var(--red);padding-left:18px;margin:28px 0;color:var(--ink);}
.color-story{margin:40px 0;}
.color-story h4{margin-bottom:16px;}
.swatches{display:flex;gap:0;flex-wrap:wrap;border:var(--bd);width:fit-content;}
.swatch-chip{border-right:var(--bd);}
.swatch-chip:last-child{border-right:none;}
.swatch-chip .sw{width:70px;height:70px;}
.swatch-chip .hx{font-family:var(--mono);font-size:9px;font-weight:700;padding:6px;text-align:center;border-top:var(--bd);}
.result-actions{display:flex;flex-direction:column;gap:12px;margin-top:40px;}

/* share card — the loud black/red poster */
.share-card{background:var(--ink);color:#fff;border:var(--bd);box-shadow:var(--sh-red);padding:40px 32px;margin:30px 0;position:relative;overflow:hidden;}
.share-card .brand{color:#fff;}
.share-card .brand::after{background:var(--red);}
.share-card .big{font-family:var(--display);font-weight:700;text-transform:uppercase;font-size:clamp(30px,6vw,52px);line-height:.95;margin:22px 0 10px;}
.share-card .big .mark{color:var(--red);display:block;}
.share-card .mini-bars{margin:24px 0 6px;}
.share-card .mini-bars .dna-row{border-color:rgba(255,255,255,.2);padding:12px 0;}
.share-card .mini-bars .nm{font-size:14px;color:#fff;}
.share-card .mini-bars .bar{border-color:rgba(255,255,255,.4);background:transparent;}
.share-card .url{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-top:24px;}

/* ============================================================
   AUTHED / SHARED
   ============================================================ */
.authed-page{padding:calc(var(--nav-h) + 28px) 0 120px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:36px;flex-wrap:wrap;border-bottom:var(--bd);padding-bottom:24px;}
.page-head h1{font-size:clamp(34px,6vw,64px);}
.page-head .eyebrow{display:block;margin-bottom:12px;}
.page-head p{font-family:var(--mono);font-size:12px;text-transform:uppercase;color:var(--gray);margin-top:12px;max-width:440px;line-height:1.6;}

/* card base */
.card{border:var(--bd);background:var(--white);box-shadow:var(--sh);}

/* dashboard */
.home-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}
@media(max-width:860px){.home-grid{grid-template-columns:1fr;}}
.feature-card{border:var(--bd);box-shadow:var(--sh);padding:28px;background:var(--white);transition:transform .14s var(--ease),box-shadow .14s var(--ease);position:relative;}
.feature-card:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--ink);}
.feature-card .eyebrow{margin-bottom:14px;}
.feature-card h3{font-size:28px;margin-bottom:10px;}
.feature-card p{font-family:var(--mono);font-size:12px;text-transform:uppercase;color:var(--gray);line-height:1.6;margin-bottom:20px;}
.feature-card.tall{grid-row:span 2;background:var(--red);color:#fff;display:flex;flex-direction:column;justify-content:space-between;min-height:320px;}
.feature-card.tall .eyebrow{color:#fff;}
.feature-card.tall h3{font-size:38px;}
.feature-card.tall p{color:rgba(255,255,255,.85);}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);border:var(--bd);margin:30px 0;}
@media(max-width:600px){.stat-row{grid-template-columns:repeat(2,1fr);}}
.stat{padding:26px 20px;text-align:center;border-right:var(--bd);}
.stat:last-child{border-right:none;}
@media(max-width:600px){.stat:nth-child(2n){border-right:none;}.stat:nth-child(-n+2){border-bottom:var(--bd);}}
.stat .v{font-family:var(--display);font-weight:700;font-size:44px;line-height:1;}
.stat .l{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-top:8px;}

/* filter tabs (shared) */
.tabs{display:flex;border:var(--bd);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;margin-bottom:24px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:none;padding:13px 20px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);border-right:var(--bd);white-space:nowrap;transition:background .15s,color .15s;}
.tab:last-child{border-right:none;}
.tab:hover{color:var(--ink);}
.tab.active{background:var(--ink);color:#fff;}

/* ============================================================
   EXPLORER
   ============================================================ */
.x-hero{display:grid;grid-template-columns:1.1fr 1fr;border-bottom:var(--bd);}
.x-hero .big-cell{position:relative;overflow:hidden;border-right:var(--bd);min-height:62vh;display:flex;align-items:flex-end;padding:34px;}
.x-hero .big-cell .ph{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.06);transition:transform 8s linear;}
.x-hero .big-cell::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),transparent 55%);}
.x-hero .big-cell .ov{position:relative;z-index:1;color:#fff;}
.x-hero .big-cell .ov .badge{display:inline-block;background:var(--red);font-family:var(--mono);font-weight:700;font-size:11px;text-transform:uppercase;padding:6px 12px;margin-bottom:16px;}
.x-hero .big-cell .ov h2{font-size:clamp(34px,4.5vw,60px);}
.x-hero .side{display:grid;grid-template-rows:1fr 1fr;}
.x-hero .side .cell{position:relative;overflow:hidden;border-bottom:var(--bd);display:flex;align-items:flex-end;padding:22px;}
.x-hero .side .cell:last-child{border-bottom:none;}
.x-hero .side .cell .ph{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 6s linear;}
.x-hero .side .cell::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55),transparent 55%);}
.x-hero .side .cell .lbl{position:relative;z-index:1;color:#fff;font-family:var(--display);font-weight:700;font-size:22px;text-transform:uppercase;}
.x-hero .side .cell .lbl small{display:block;font-family:var(--mono);font-size:10px;color:var(--red);margin-bottom:4px;}
@media(max-width:860px){.x-hero{grid-template-columns:1fr;}.x-hero .big-cell{border-right:none;border-bottom:var(--bd);min-height:55vw;}}

.x-stats{display:flex;border-bottom:var(--bd);}
.x-stat{flex:1;padding:22px;text-align:center;border-right:var(--bd);}
.x-stat:last-child{border-right:none;}

/* 4. SCORING --------------------------------------------------------------- */
function scoreQuiz(answers){
  const totals={};AES_KEYS.forEach(k=>totals[k]=0);
  QUESTIONS.forEach(qq=>{
    const a=answers[qq.id];if(a==null)return;
    if(qq.type==='slider'&&qq.score){const s=qq.score(a);for(const k in s)add(totals,k,s[k]);}
    else if(qq.multi){(a||[]).forEach(i=>{const sc=qq.options[i]?.scores||{};for(const k in sc)add(totals,k,sc[k]);});}
    else{const sc=qq.options[a]?.scores||{};for(const k in sc)add(totals,k,sc[k]);}
  });
  const sum=Object.values(totals).reduce((x,y)=>x+y,0)||1;
  let bd=AES_KEYS.map(k=>({key:k,name:AESTHETICS[k].name,pct:totals[k]/sum*100})).filter(b=>b.pct>0).sort((a,b)=>b.pct-a.pct);
  let top=bd.filter(b=>b.pct>=6).slice(0,4);if(top.length<2)top=bd.slice(0,3);
  const tsum=top.reduce((x,y)=>x+y.pct,0)||1;
  top=top.map(b=>({...b,pct:Math.round(b.pct/tsum*100)}));
  const diff=100-top.reduce((x,y)=>x+y.pct,0);if(top[0])top[0].pct+=diff;
  const p=top[0];
  return{primary:p.key,primaryName:p.name,breakdown:top,palette:AESTHETICS[p.key].palette,summary:buildSummary(top),tags:AESTHETICS[p.key].tags,createdAt:Date.now()};
}
function buildSummary(top){const a=AESTHETICS[top[0].key];let s=a.blurb;if(top[1])s+=` Plus a streak of ${top[1].name.toLowerCase()} so it never gets predictable.`;return s;}

const OCCASIONS=['Everyday','Work','Evening','Weekend','Event'];
function scoreItemForDna(item,dna){if(!dna)return 1;let best=0;dna.breakdown.forEach(b=>{if(item.aes.includes(b.key))best=Math.max(best,b.pct);});return best/100+0.15;}
function generateOutfit(occasion){
  const dna=State.dna();let pool=State.closet().filter(i=>i.category);if(pool.length<3)pool=pool.concat(CAT_ITEMS);
  const pick=(cat)=>{const c=pool.filter(i=>i.category===cat);if(!c.length)return null;const w=c.map(i=>({i,w:scoreItemForDna(i,dna)*(0.6+Math.random()*0.8)}));w.sort((a,b)=>b.w-a.w);return w[0].i;};
  const slots=[pick('top'),pick('bottom'),pick('shoes')];
  if(['Work','Evening','Event'].includes(occasion)||Math.random()>0.5)slots.push(pick('outerwear'));
  slots.push(pick('accessory'));
  const items=slots.filter(Boolean);
  const match=Math.round(items.reduce((s,i)=>s+scoreItemForDna(i,dna),0)/items.length*70+24);
  return{id:'of-'+Date.now()+'-'+Math.floor(Math.random()*1000),occasion,items,match:Math.min(98,match),palette:[...new Set(items.map(i=>i.color))].slice(0,4),createdAt:Date.now()};
}

/* 8. LAB ------------------------------------------------------------------- */
const NEUTRALS=['#E8E3D9','#FFFFFF','#1C1C1E','#2C2C2E','#0A0A0A','#8A8A8E','#9A8C76','#C9BBA8','#2C2C28','#3a352d','Cream','White','Black','Charcoal','Grey','Taupe','Sand','Stone','Ink','Slate'];
function isNeutral(it){return NEUTRALS.includes(it.color)||NEUTRALS.includes(it.colorName);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function computeLab(){
  let items=State.closet();const usingSample=items.length<4;if(usingSample)items=CAT_ITEMS;
  const cats=new Set(items.map(i=>i.category));const catCoverage=cats.size/5;
  const neutralRatio=items.filter(isNeutral).length/items.length;
  const aesCount={};items.forEach(i=>(i.aes||[]).forEach(a=>aesCount[a]=(aesCount[a]||0)+1));
  const maxAes=Math.max(1,...Object.values(aesCount));const consistency=maxAes/items.length;
  const outfitsPossible=Math.min(items.filter(i=>i.category==='top').length,items.filter(i=>i.category==='bottom').length,items.filter(i=>i.category==='shoes').length||1);
  const scores={
    colour:clamp(Math.round((0.5*neutralRatio+0.5*(1-Math.abs(neutralRatio-0.7)))*100),40,96),
    versatility:clamp(Math.round((0.55*catCoverage+0.45*neutralRatio)*100),35,95),
    consistency:clamp(Math.round(consistency*120),38,97),
    efficiency:clamp(Math.round(Math.min(1,outfitsPossible/Math.max(3,items.length/3))*100),40,94)
  };
  return{usingSample,scores,insights:buildInsights(items,{neutralRatio,catCoverage,scores}),itemCount:State.closet().length};
}
function buildInsights(items,ctx){
  const out=[];const warm=items.filter(i=>['Gold','Tan','Camel','Espresso','Sand'].includes(i.colorName)).length;const hasSilver=items.some(i=>i.colorName==='Silver');
  if(warm>items.length*0.4&&!hasSilver)out.push(['accent','Add one silver piece','Palette skews warm. A silver cuff adds contrast without breaking harmony.']);
  if(ctx.neutralRatio<0.5)out.push(['layer','Stack more neutrals','A few neutral basics let your loud pieces breathe and multiply your fits.']);
  if(ctx.catCoverage<0.8)out.push(['gap','Close a gap','Light on outerwear — one coat unlocks cold-weather looks across the board.']);
  if(ctx.scores.consistency<60)out.push(['focus','Sharpen the throughline','Closet spans several aesthetics. Lean into your top two for more intent.']);
  out.push(['win','Strong base','Your neutral foundation is working — the backbone every versatile wardrobe needs.']);
  return out.slice(0,4);
}

function renderBar(){

  $('#qcount').textContent=`Question ${String(quizState.i+1).padStart(2,'0')} / ${QUESTIONS.length}`;

function renderQuestion(){
  renderBar();const q=QUESTIONS[quizState.i];const stage=$('#stage');let body='';
  if(q.type==='slider'){
    const val=quizState.answers[q.id]??q.start;
    body=`<div class="slider-wrap"><div class="slider-val" id="sval">${val}</div><input type="range" id="slider" min="${q.min}" max="${q.max}" value="${val}"/><div class="slider-labels"><span>${q.leftLabel}</span><span>${q.rightLabel}</span></div></div>`;
  } else {
    const sel=quizState.answers[q.id];
    body=`<div class="tile-grid cols-${q.cols}">${q.options.map((o,i)=>{
      const isSel=q.multi?Array.isArray(sel)&&sel.includes(i):sel===i;
      return `<button class="choice ${q.swatch?'swatch':''} ${isSel?'sel':''}" data-i="${i}" data-photo="${o.photo||''}" style="${o.grad?tile(o.grad):''}"><div class="check">${svgIcon('check')}</div><div class="cap">${o.label}</div></button>`;
    }).join('')}</div>`;
  }
  stage.innerHTML=`<div class="q-card" id="qcard"><div class="q-head"><span class="eyebrow">${q.eyebrow}</span><h2>${q.q}</h2>${q.sub?`<p>${q.sub}</p>`:''}</div>${body}</div>`;
  if(q.type!=='slider'){
    stage.querySelectorAll('.choice[data-photo]').forEach(btn=>{const pid=btn.dataset.photo;if(!pid)return;const url=uns(pid,600);const im=new Image();im.onload=()=>{btn.style.backgroundImage=`url('${url}')`;};im.src=url;});
  }
  const isLast=quizState.i===QUESTIONS.length-1;const answered=isAnswered(q);
  $('#qfoot').innerHTML=`<button class="q-back" id="qback" ${quizState.i===0?'style=visibility:hidden':''}>${svgIcon('back')} Back</button>
    ${(!q.multi&&q.type!=='slider')?'':`<button class="btn btn-red btn-sm" id="qnext" ${answered?'':'disabled'}>${isLast?'See my DNA':'Continue'} ${svgIcon('arrow')}</button>`}`;
  if(q.type==='slider'){
    const sl=$('#slider'),sv=$('#sval');sl.addEventListener('input',()=>{sv.textContent=sl.value;quizState.answers[q.id]=+sl.value;});
    if(quizState.answers[q.id]==null)quizState.answers[q.id]=q.start;
  } else {
    stage.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>{
      const i=+btn.dataset.i;
      if(q.multi){let arr=Array.isArray(quizState.answers[q.id])?quizState.answers[q.id]:[];arr=arr.includes(i)?arr.filter(x=>x!==i):[...arr,i];quizState.answers[q.id]=arr;renderQuestion();}
      else{quizState.answers[q.id]=i;DB.set('quiz',quizState.answers);stage.querySelectorAll('.choice').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');setTimeout(next,260);}
    }));
  }
  $('#qback')?.addEventListener('click',prev);$('#qnext')?.addEventListener('click',next);DB.set('quiz',quizState.answers);
}
function isAnswered(q){const a=quizState.answers[q.id];if(q.type==='slider')return true;if(q.multi)return Array.isArray(a)&&a.length>0;return a!=null;}
function next(){const q=QUESTIONS[quizState.i];if(!isAnswered(q))return;DB.set('quiz',quizState.answers);if(quizState.i===QUESTIONS.length-1){finishQuiz();return;}const c=$('#qcard');c.classList.add('out');setTimeout(()=>{quizState.i++;renderQuestion();},230);}

  app.innerHTML=`<div class="page authed-page"><div class="wrap" style="max-width:800px">
    <div class="profile-head"><div class="avatar">${initial}</div><div><span class="eyebrow">Style DNA</span><h1 style="font-size:44px;margin-top:6px">${esc(dna.primaryName)}</h1></div></div>
    <div class="dna-bars">${dna.breakdown.map(b=>`<div class="dna-row"><div class="top"><span class="nm">${esc(b.name)}</span><span class="pc">${b.pct}%</span></div><div class="bar"><i style="width:${b.pct}%"></i></div></div>`).join('')}</div>
    <div class="color-story"><h4 class="eyebrow k">Colour story</h4><div class="swatches">${dna.palette.map(c=>`<div class="swatch-chip"><div class="sw" style="background:${c}"></div><div class="hx">${c}</div></div>`).join('')}</div></div>
    <div class="tag-row">${dna.tags.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>
    <div class="stat-row"><div class="stat"><div class="v">${State.closet().length}</div><div class="l">Items</div></div><div class="stat"><div class="v">${State.saved().length}</div><div class="l">Saved</div></div><div class="stat"><div class="v">${State.outfits().length}</div><div class="l">Fits</div></div><div class="stat"><div class="v">${dna.breakdown.length}</div><div class="l">Aesthetics</div></div></div>
    <div class="hr"></div>
    <div class="flex gap wrap-f"><button class="btn btn-sm" id="retake2">Retake quiz</button><button class="btn btn-red btn-sm" id="reset">Reset all</button></div>
  </div></div>`;
  $('#retake2').addEventListener('click',()=>{DB.del('quiz');go('#/quiz');});
  $('#reset').addEventListener('click',()=>{if(confirm('Clear DNA, closet, saves & fits?')){State.reset();go('#/');}});
}

/* ---- shared ---- */
function modal(html,onMount){const root=$('#modalRoot');root.innerHTML=`<div class="modal-back" id="mb"><div class="modal" id="m">${html}</div></div>`;$('#mb').addEventListener('click',e=>{if(e.target.id==='mb')closeModal();});if(onMount)onMount($('#m'));}
function closeModal(){$('#modalRoot').innerHTML='';}
function observeReveals(){const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{rootMargin:'-30px'});document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));}

/* 12. ROUTER --------------------------------------------------------------- */
const ROUTES={'#/':viewHome,'#/quiz':viewQuiz,'#/result':viewResult,'#/home':viewDashboard,'#/explore':viewExplore,'#/closet':guard(viewCloset),'#/outfits':guard(viewOutfits),'#/lab':guard(viewLab),'#/profile':guard(viewProfile)};
function guard(fn){return()=>{if(!State.dna()){toast('Take the quiz first');go('#/quiz');return;}fn();};}
function router(){
  const hash=location.hash||'#/';const route=ROUTES[hash]?hash:'#/';
  if(hash==='#/'&&State.dna()){location.hash='#/home';return;}
  if(route!=='#/explore'){window.removeEventListener('scroll',window._xPar);}
  window.scrollTo(0,0);renderNav(route);(ROUTES[route]||viewHome)();
}
window.addEventListener('hashchange',router);
window.addEventListener('load',()=>{reflectAuth();initCursor();router();});
window.go=go;
reflectAuth();initCursor();router();
</script>
