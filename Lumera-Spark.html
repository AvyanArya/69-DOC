  @keyframes gpan{ 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

/* ---- Error boundary: a crash shows a recovery card, not a white screen ---- */
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  componentDidCatch(e,i){ console.error('Spark caught:',e,i); }
  render(){
    if(this.state.err) return (
      <div style={{minHeight:'100vh',display:'grid',placeItems:'center',padding:'24px'}}>
        <div className="lux-card" style={{maxWidth:'380px',textAlign:'center',padding:'28px'}}>
          <div style={{fontSize:'30px'}}>🌀</div>
          <h2 style={{fontFamily:'Fraunces,serif',fontSize:'22px',margin:'8px 0'}}>That glitched.</h2>
          <p style={{color:'#7C7264',fontSize:'14px',marginBottom:'18px'}}>Your progress is saved. Give it another go.</p>
          <button className="btn btn-grape" style={{padding:'10px 24px'}} onClick={()=>this.setState({err:null})}>Retry</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function useHashRoute(){
  const [route,setRoute]=useState(()=> location.hash.replace('#','')||'/');
  useEffect(()=>{ const on=()=>{ setRoute(location.hash.replace('#','')||'/'); window.scrollTo({top:0,behavior:'instant'}); };
    window.addEventListener('hashchange',on); return ()=>window.removeEventListener('hashchange',on); },[]);
  const nav=useCallback((to)=>{ location.hash=to; },[]);
  return [route,nav];
}

  return <span className={cx('inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-xs font-semibold', map[tone], className)}>{children}</span>;
}
function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{ const els=ref.current?ref.current.querySelectorAll('.reveal'):[];
    const io=new IntersectionObserver((es)=>es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} }),{threshold:.12});
    els.forEach(el=>io.observe(el)); return ()=>io.disconnect();
  },[]);
  return ref;
}

function XPBurst({fire}){
  const [bits,setBits]=useState([]);
  useEffect(()=>{ if(!fire) return; const cols=['#BFA06A','#FF6B6B','#16C49A','#3BA8FF','#FFB23E'];
    setBits(Array.from({length:26},(_,i)=>({id:i+'-'+fire,left:Math.random()*100,bg:cols[i%cols.length],delay:Math.random()*.2})));
    const t=setTimeout(()=>setBits([]),1150); return ()=>clearTimeout(t);
  },[fire]);
  return bits.map(b=><span key={b.id} className="conf" style={{left:b.left+'vw',background:b.bg,animationDelay:b.delay+'s'}}/>);
}

            <div><div className="font-serif text-2xl text-charcoal leading-none">Level {lvl}</div><div className="text-sm text-muted mt-1 tnum">{app.xp} XP</div></div></div>
          <div className="mt-4 xpbar"><i style={{width:Math.max(6,pct)+'%'}}/></div>
          <div className="text-xs text-muted mt-1.5">{next-app.xp} XP to level {lvl+1}</div>
          <div className="flex flex-wrap gap-2 mt-4">
            <Pill tone="sun">🔥 {app.streak} day streak</Pill>
            <Pill tone="mint">🎚️ {bandLabel}</Pill>
            <Pill tone="grape">🏅 {app.badges} badges</Pill>
          </div>
        </div>
      </Card>
      <div className="lg:col-span-2"><QuestsPanel/></div>
    </div>

    {/* The Lumera family of products */}
    <div className="flex items-center justify-between mb-3 mt-2">
      <h2 className="font-serif text-2xl text-charcoal">The Lumera family</h2>
      <button onClick={()=>app.nav('/hub')} className="text-sm font-semibold text-goldd">All products →</button>
    </div>
    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-7 stagger">
      {Object.values(SUBS).map(s=><button key={s.key} disabled={!s.live} onClick={()=>s.live&&app.nav('/sub/'+s.key)}
        className="lux-card lift p-4 text-left sweep-wrap disabled:opacity-60 disabled:cursor-default">
        <div className="flex items-center justify-between"><span className="text-2xl">{s.emoji}</span>
          {s.live? <Icon name="arrowR" size={15} className="text-faint"/> : <span className="text-[10px] text-faint">Soon</span>}</div>
        <div className="font-serif text-base text-charcoal mt-2">{s.name}</div>
        <div className="text-[11px] font-semibold" style={{color:s.accent}}>{s.tag}</div>
      </button>)}
    </div>

    {/* Made for you (age-filtered) */}
    <PageHead eyebrow={`Made for ${bandLabel}`} title="Your tools, curated."
      desc="Leading with what matters at your stage. Everything else is one tap away in each product." />
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
      {featured.slice(0,6).map(t=><ToolCard key={t.id} t={t}/>)}
    </div>
  </AppShell>;
}

/* ============================================================
   PRODUCT HUB · SUBSIDIARY PAGE · TOOL PAGE · PROFILE
   ============================================================ */
function Hub(){
  const app=useApp();
  return <AppShell>
    <PageHead eyebrow="Lumera Group" title="Your products."
      desc="Lumera is the parent. Tap any product to enter its world — your XP and streak follow you everywhere." />
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
      {Object.values(SUBS).map(s=>{ const tools=TOOLS.filter(t=>t.sub===s.key);
        return <Card key={s.key} hover={s.live} onClick={s.live?()=>app.nav('/sub/'+s.key):undefined} className="relative overflow-hidden sweep-wrap">
          <div className="absolute -top-10 -right-10 h-28 w-28 rounded-full blur-2xl opacity-30" style={{background:s.accent}}/>
          <div className="relative"><div className="flex items-center gap-2"><span className="text-2xl">{s.emoji}</span>
            <div><div className="font-serif text-lg text-charcoal leading-none">{s.name}</div><div className="text-xs font-semibold" style={{color:s.accent}}>{s.tag} · by Lumera</div></div></div>
            <p className="text-sm text-muted mt-3 leading-relaxed">{s.blurb}</p>
            {s.live?<div className="flex flex-wrap gap-1.5 mt-4">{tools.slice(0,4).map(t=><span key={t.id} className="text-[11px] rounded-full bg-sand px-2 py-0.5 text-muted">{t.emoji} {t.name}</span>)}{tools.length>4&&<span className="text-[11px] text-faint px-1 py-0.5">+{tools.length-4}</span>}</div>:<Pill className="mt-4">Coming soon</Pill>}</div>
        </Card>; })}
    </div>
  </AppShell>;
}
function ToolCard({t,dim}){
  const app=useApp(); const accent=SUBS[t.sub].accent;
  return <Card onClick={()=>app.nav('/tool/'+t.id)} className={cx('group', dim&&'opacity-70')}>
    <div className="flex items-start gap-3"><span className="grid place-items-center h-11 w-11 rounded-xl text-xl shrink-0 group-hover:scale-110 transition" style={{background:accent+'18'}}>{t.emoji}</span>
      <div><div className="font-serif text-lg text-charcoal">{t.name}</div><p className="text-sm text-muted mt-1 leading-relaxed">{t.desc}</p></div></div>
    <div className="mt-3 text-xs font-semibold flex items-center gap-1 opacity-0 group-hover:opacity-100 transition" style={{color:accent}}>Open <Icon name="arrowR" size={13}/></div>
  </Card>;
}
function SubPage({subKey}){
  const app=useApp(); const s=SUBS[subKey]; const [showAll,setShowAll]=useState(false);
  if(!s) return <AppShell><div className="text-center text-muted py-20">Unknown product.</div></AppShell>;
  const all=TOOLS.filter(t=>t.sub===subKey); const featured=all.filter(t=>t.bands.includes(app.band)); const more=all.filter(t=>!t.bands.includes(app.band));
  return <AppShell>
    <button onClick={()=>app.nav('/hub')} className="text-sm text-muted hover:text-charcoal">← All products</button>
    <div className="mt-4 mb-2 flex items-center gap-3"><span className="grid place-items-center h-14 w-14 rounded-2xl text-2xl" style={{background:s.accent+'1A', boxShadow:'0 0 0 1px '+s.accent+'33'}}>{s.emoji}</span>
      <div><h1 className="font-serif text-3xl text-charcoal">{s.name} <span className="text-base font-sans text-muted">by Lumera</span></h1><div className="text-sm font-semibold" style={{color:s.accent}}>{s.tag}</div></div></div>
    <p className="text-muted max-w-xl mb-6">{s.blurb}</p>
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">{featured.map(t=><ToolCard key={t.id} t={t}/>)}</div>
    {more.length>0 && <div className="mt-6">
      <button onClick={()=>setShowAll(v=>!v)} className="btn btn-ghost px-4 py-2 text-sm">{showAll?'Hide':'Show'} more tools ({more.length}) <Icon name="chevron" size={14} className={showAll?'-rotate-90':'rotate-90'}/></button>
      <p className="text-xs text-faint mt-2">Here whenever you need them — just less relevant for your stage right now.</p>
      {showAll && <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-4 stagger">{more.map(t=><ToolCard key={t.id} t={t} dim/>)}</div>}
    </div>}
  </AppShell>;
}
function ToolPage({toolId}){
  const app=useApp(); const t=TOOLS.find(x=>x.id===toolId); const s=t&&SUBS[t.sub];
  if(!t) return <AppShell><div className="text-center text-muted py-20">Tool not found.</div></AppShell>;
  return <AppShell>
    <button onClick={()=>app.nav('/sub/'+t.sub)} className="text-sm text-muted hover:text-charcoal">← {s.name}</button>
    <Card className="mt-4 text-center max-w-lg mx-auto">
      <div className="text-4xl floaty">{t.emoji}</div>
      <h1 className="font-serif text-3xl text-charcoal mt-3">{t.name}</h1>
      <p className="text-muted mt-2">{t.desc}</p>
      <div className="rounded-xl2 border border-line bg-cream p-4 mt-5 text-sm text-muted text-left">
        <b className="text-charcoal">In this Spark preview</b> the full interactive {t.name.toLowerCase()} screen isn’t wired up yet — it lives in the classic build. The gamified shell, quests, products and onboarding are fully working here.</div>
      <button onClick={()=>app.award(15)} className="btn btn-grape px-6 py-3 mt-5">Mark as explored · +15 XP</button>
    </Card>
  </AppShell>;
}
function Profile(){
  const app=useApp(); const lvl=levelFromXp(app.xp);
  return <AppShell>
    <PageHead eyebrow="Profile" title="Make Spark yours." />
    <div className="grid lg:grid-cols-3 gap-4">
      <Card className="lg:col-span-2">
        <div className="flex items-center gap-3"><span className="grid place-items-center h-14 w-14 rounded-2xl bg-gradient-to-br from-grape to-graped text-white text-xl font-serif">{lvl}</span>
          <div><h2 className="font-serif text-2xl text-charcoal">{app.profile.name||'You'}</h2><div className="text-sm text-muted">Level {lvl} · {app.xp} XP · 🔥 {app.streak} day streak</div></div></div>
        <div className="grid grid-cols-3 gap-3 mt-5">
          <div className="rounded-xl2 border border-line bg-cream p-3"><div className="text-xs text-muted">Age mode</div><div className="font-serif text-lg text-charcoal">{(BANDS.find(b=>b.id===app.band)||{}).label}</div></div>
          <div className="rounded-xl2 border border-line bg-cream p-3"><div className="text-xs text-muted">Badges</div><div className="font-serif text-lg text-charcoal">{app.badges}</div></div>
          <div className="rounded-xl2 border border-line bg-cream p-3"><div className="text-xs text-muted">Best streak</div><div className="font-serif text-lg text-charcoal">{app.streak}</div></div>
        </div>
        <div className="mt-5"><div className="text-xs text-muted mb-2">Change age mode (re-tunes what’s featured)</div>
          <div className="flex flex-wrap gap-2">{BANDS.map(b=><button key={b.id} onClick={()=>app.setBand(b.id)} className={cx('chip', app.band===b.id&&'on')}>{b.emoji} {b.label}</button>)}</div></div>
        <div className="flex gap-2 mt-6"><button onClick={()=>app.nav('/onboard')} className="btn btn-ghost flex-1 py-2.5 text-sm">Redo setup</button>
          <button onClick={app.logout} className="btn btn-ghost flex-1 py-2.5 text-sm">Log out</button></div>
      </Card>
      <QuestsPanel/>
    </div>
  </AppShell>;
}

/* ============================================================
   APP ROOT
   ============================================================ */
const todayStr=()=>new Date().toISOString().slice(0,10);
const DEFAULT_QUESTS=[
  { id:'q1', emoji:'👀', label:'Check your dashboard', hint:'A 5-second glance counts.', xp:10, done:false },
  { id:'q2', emoji:'📺', label:'Review one subscription', hint:'Cancel one you forgot about.', xp:20, done:false },
  { id:'q3', emoji:'📚', label:'Finish a 2-minute lesson', hint:'Tiny lessons, real gains.', xp:25, done:false },
];
function App(){
  const [route,nav]=useHashRoute();
  const persisted=load();
  const [user,setUser]=useState(persisted.user||null);
  const [demo,setDemo]=useState(persisted.demo||false);
  const [onboarded,setOnboarded]=useState(persisted.onboarded||false);
  const [band,setBandState]=useState(persisted.band||'young');
  const [profile,setProfile]=useState(persisted.profile||{name:'',vibe:'',goal:''});
  const [xp,setXp]=useState(persisted.xp||0);
  const [streak,setStreak]=useState(persisted.streak||1);
  const [badges,setBadges]=useState(persisted.badges||0);
  const [quests,setQuests]=useState(persisted.questDay===todayStr()?(persisted.quests||DEFAULT_QUESTS):DEFAULT_QUESTS);
  const [mobileMenu,setMobileMenu]=useState(false);
  const [burst,setBurst]=useState(0);

  useEffect(()=>{ const p=load(); const last=p.lastDay; const today=todayStr();
    if(last&&last!==today){ const y=new Date(Date.now()-864e5).toISOString().slice(0,10); setStreak(s=> last===y?(s+1):1); } },[]);
  useEffect(()=>{ save({user,demo,onboarded,band,profile,xp,streak,badges,quests,questDay:todayStr(),lastDay:todayStr()}); },[user,demo,onboarded,band,profile,xp,streak,badges,quests]);
  useEffect(()=>{ const el=document.getElementById('loader'); if(el){ el.style.opacity='0'; setTimeout(()=>el.remove(),600); } },[]);
  useEffect(()=>{ setMobileMenu(false); },[route]);
  // Open straight into a populated gamified dashboard so the experience is visible
  // immediately (no landing wall). Runs once per page load; logout still returns home.
  const booted=useRef(false);
  useEffect(()=>{ if(booted.current) return; booted.current=true;
    if(!user){ setUser({name:'Avyan'}); setDemo(true); setOnboarded(true);
      setProfile(p=>({...p, name:'Avyan', vibe:p.vibe||'Saving up', goal:p.goal||'Build a buffer'}));
      setBandState(b=>b||'young'); if(!xp) setXp(120); setStreak(s=>s>1?s:4);
      if(location.hash.replace('#','')==='' || location.hash==='#/') nav('/dashboard'); }
  },[]);

  const award=useCallback((n)=>{ setXp(x=>x+n); setBurst(b=>b+1); },[]);
  const completeQuest=useCallback((id)=>{ setQuests(qs=>qs.map(q=>{ if(q.id===id&&!q.done){ award(q.xp); return {...q,done:true}; } return q; })); },[award]);
  const completeOnboard=useCallback(({band,vibe,goal})=>{ setBandState(band); setProfile(p=>({...p,vibe,goal})); setOnboarded(o=>{ if(!o){ award(50); setBadges(b=>b+1); } return true; }); },[award]);
  const startDemo=useCallback(()=>{ setUser({name:'Demo'}); setDemo(true); setProfile({name:'Demo',vibe:'Just curious',goal:'Learn the basics'}); setBandState('young'); setOnboarded(false); nav('/onboard'); },[nav]);
  const logout=useCallback(()=>{ setUser(null); setDemo(false); setOnboarded(false); setXp(0); setStreak(1); setBadges(0); setQuests(DEFAULT_QUESTS); nav('/'); },[nav]);
  useEffect(()=>{ if(route==='/onboard'&&!user) setUser({name:''}); },[route,user]);

  const value={ route, nav, user, demo, onboarded, band, setBand:setBandState, profile, setProfile,
    xp, streak, badges, quests, award, completeQuest, completeOnboard, startDemo, logout, mobileMenu, setMobileMenu };

  // synchronous route guards — no blank-frame flash
  let view=null; const seg=route.split('/').filter(Boolean);
  if(route==='/') view=<Landing/>;
  else if(route==='/onboard') view=<Onboarding/>;
  else if(!user){ if(route!=='/') location.hash='/'; view=<Landing/>; }
  else if(!onboarded && route!=='/onboard'){ location.hash='/onboard'; view=<Onboarding/>; }
  else if(route==='/dashboard') view=<Dashboard/>;
  else if(route==='/hub') view=<Hub/>;
  else if(route==='/profile') view=<Profile/>;
  else if(seg[0]==='sub') view=<SubPage subKey={seg[1]}/>;
  else if(seg[0]==='tool') view=<ToolPage toolId={seg[1]}/>;
  else view=<Dashboard/>;

  return <Ctx.Provider value={value}><XPBurst fire={burst}/>{view}</Ctx.Provider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
