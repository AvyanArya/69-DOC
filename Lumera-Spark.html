/* ============================================================
   ERROR BOUNDARY — runtime crashes show a recovery screen, not a blank page
   ============================================================ */
class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  componentDidCatch(e,i){ console.error('Spark caught:',e,i); }
  render(){
    if(this.state.err) return (
      <div style={{minHeight:'100vh',display:'grid',placeItems:'center',padding:'24px'}}>
        <div style={{maxWidth:'380px',textAlign:'center'}}>
          <div style={{fontSize:'34px'}}>😵‍💫</div>
          <h2 style={{fontFamily:'Fraunces,serif',fontSize:'22px',margin:'8px 0'}}>That glitched.</h2>
          <p style={{color:'#9A93AE',fontSize:'14px',marginBottom:'18px'}}>Your progress is saved. Give it another go.</p>
          <button className="btn btn-grape" style={{padding:'10px 24px'}} onClick={()=>this.setState({err:null})}>Retry</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

/* ============================================================
   ROUTER
   ============================================================ */
function useHashRoute(){
  const [route,setRoute]=useState(()=> location.hash.replace('#','')||'/');
  useEffect(()=>{
    const on=()=>{ setRoute(location.hash.replace('#','')||'/'); window.scrollTo({top:0,behavior:'instant'}); };
    window.addEventListener('hashchange',on); return ()=>window.removeEventListener('hashchange',on);
  },[]);
  const nav=useCallback((to)=>{ location.hash=to; },[]);
  return [route,nav];
}

const Ctx = createContext(null);
const useApp = ()=> useContext(Ctx);
const levelFromXp = (xp)=> Math.floor(Math.sqrt(xp/40))+1;
const xpForLevel = (lvl)=> 40*Math.pow(lvl-1,2);

/* ============================================================

const Card = ({className='',children,onClick,hover=true,style})=>
  <div onClick={onClick} style={style} className={cx('card p-5 sm:p-6', hover&&'lift', onClick&&'cursor-pointer', className)}>{children}</div>;
const Pill = ({children,style,className=''})=> <span className={cx('pill', className)} style={style}>{children}</span>;

function XPBurst({fire}){
  const [bits,setBits]=useState([]);
  useEffect(()=>{ if(!fire) return; const cols=['#FF5C8A','#7C5CFF','#46C7FF','#34E0A1','#FFC24B'];
    const arr=Array.from({length:26},(_,i)=>({id:i+fire, left:Math.random()*100, bg:cols[i%cols.length], delay:Math.random()*.2}));
    setBits(arr); const t=setTimeout(()=>setBits([]),1100); return ()=>clearTimeout(t);
  },[fire]);
  return bits.map(b=> <span key={b.id} className="conf" style={{left:b.left+'vw', background:b.bg, animationDelay:b.delay+'s'}}/>);
}

/* ============================================================

  const app=useApp(); if(!app.user) return null;
  const lvl=levelFromXp(app.xp); const base=xpForLevel(lvl), next=xpForLevel(lvl+1);

  return <header className="sticky top-0 z-40 glass">
    <div className="max-w-[1180px] mx-auto flex items-center gap-3 px-4 sm:px-6 h-16">
      <button onClick={()=>app.nav('/hub')} className="flex items-center gap-2">

  const [goal,setGoal]=useState(app.profile.goal||'');
  const total=4;

  const finish=()=>{ app.completeOnboard({band, vibe, goal}); app.nav('/dashboard'); };
  const skip=()=>{ // "I've already done this" — keep existing data, jump in
    app.completeOnboard({band:app.band||band, vibe:app.profile.vibe||vibe, goal:app.profile.goal||goal}); app.nav('/dashboard'); };

  return <div className="min-h-screen grid place-items-center px-4 py-10">
    <div className="w-full max-w-lg">
      <div className="flex items-center justify-between mb-5">
        <button onClick={()=> step>0? setStep(step-1) : app.nav('/')} className="text-sm text-muted hover:text-cloud">← Back</button>
        <div className="flex gap-1.5">{Array.from({length:total}).map((_,i)=>
          <span key={i} className={cx('h-1.5 rounded-full transition-all', i<=step?'w-7 bg-grape':'w-3 bg-white/12')}/>)}</div>
        <button onClick={skip} className="text-sm text-muted hover:text-cloud">Skip</button>
      </div>

      {step===0 && <Card className="fadeUp">
        <div className="text-3xl floaty">🧰</div>
        <h2 className="font-serif text-2xl mt-3">First — let’s grab your stuff.</h2>
        <p className="text-muted text-sm mt-2 leading-relaxed">Lumera works off one month of real numbers. You don’t need them to the penny, but it helps to have a rough idea of these. Not sure yet? You can fill them in as you go.</p>
        <div className="grid gap-2.5 mt-4">
          {PREP_ITEMS.map(p=><div key={p.t} className="flex gap-3 items-start rounded-xl2 border border-white/8 bg-white/3 p-3">
            <span className="text-xl">{p.emoji}</span>
            <div><div className="font-semibold text-sm">{p.t}</div><div className="text-xs text-muted leading-relaxed">{p.d}</div></div>
          </div>)}
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={()=>setStep(1)} className="btn btn-grape flex-1 py-3">Got it, let’s go</button>
        </div>
        <button onClick={skip} className="w-full text-center text-sm text-muted hover:text-cloud mt-3">I’ve already set this up — skip to my dashboard</button>
      </Card>}

      {step===1 && <Card className="fadeUp">
        <h2 className="font-serif text-2xl">How old are you, roughly?</h2>
        <p className="text-muted text-sm mt-1.5">This tunes Lumera to what matters for you now. You can always see every tool — we just lead with the useful ones.</p>
        <div className="grid grid-cols-2 gap-2.5 mt-4">
          {BANDS.map(b=><button key={b.id} onClick={()=>{setBand(b.id); setStep(2);}}
            className={cx('text-left rounded-xl2 border p-3.5 transition', band===b.id?'border-grape bg-grape/15':'border-white/10 bg-white/3 hover:border-grape/50')}>
            <div className="text-2xl">{b.emoji}</div>
            <div className="font-display font-semibold mt-1">{b.label}</div>
            <div className="text-[11px] text-muted leading-snug mt-0.5">{b.sub}</div>
          </button>)}
        </div>
      </Card>}

      {step===2 && <Card className="fadeUp">
        <h2 className="font-serif text-2xl">What’s your money vibe right now?</h2>
        <p className="text-muted text-sm mt-1.5">No wrong answer — it just sets your starting quests.</p>
        <div className="flex flex-wrap gap-2 mt-4">
          {['Just surviving','Saving up','Ready to invest','Killing some debt','Just curious'].map(v=>
            <button key={v} onClick={()=>setVibe(v)} className={cx('chip', vibe===v&&'on')}>{v}</button>)}
        </div>
        <button disabled={!vibe} onClick={()=>setStep(3)} className={cx('btn w-full py-3 mt-6', vibe?'btn-grape':'btn-ghost opacity-50')}>Next</button>
      </Card>}

      {step===3 && <Card className="fadeUp">
        <h2 className="font-serif text-2xl">Pick your first quest.</h2>
        <p className="text-muted text-sm mt-1.5">We’ll build your dashboard around it (and hand you some XP).</p>
        <div className="grid gap-2.5 mt-4">
          {[['Build a £/$ buffer','🛟'],['Cut subscription waste','📺'],['Start investing','🌱'],['Learn the basics','📚'],['Crush a goal','🎯']].map(([g,e])=>
            <button key={g} onClick={()=>setGoal(g)} className={cx('flex items-center gap-3 rounded-xl2 border p-3 transition text-left', goal===g?'border-grape bg-grape/15':'border-white/10 bg-white/3 hover:border-grape/50')}>
              <span className="text-xl">{e}</span><span className="font-semibold text-sm">{g}</span></button>)}
        </div>
        <button disabled={!goal} onClick={finish} className={cx('btn w-full py-3 mt-6', goal?'btn-grape':'btn-ghost opacity-50')}>Enter Lumera →</button>
      </Card>}
    </div>
  </div>;
}

/* ============================================================
   SUBSIDIARY PAGE — its tools, age-filtered (rest under "More tools")
   ============================================================ */
function SubPage({subKey}){

  if(!s) return <Shell><Empty msg="Unknown product."/></Shell>;
  const all=TOOLS.filter(t=>t.sub===subKey);
  const featured=all.filter(t=>t.bands.includes(app.band));

  return <Shell>
    <button onClick={()=>app.nav('/hub')} className="text-sm text-muted hover:text-cloud">← All products</button>
    <div className="mt-4 mb-6 flex items-center gap-3">
      <span className="grid place-items-center h-14 w-14 rounded-2xl text-2xl" style={{background:s.accent+'22', boxShadow:'0 0 0 1px '+s.accent+'44'}}>{s.emoji}</span>
      <div><h1 className="font-serif text-3xl">{s.name} <span className="text-base font-sans text-muted">by Lumera</span></h1>
        <div className="text-sm" style={{color:s.accent}}>{s.tag}</div></div>
    </div>
    <p className="text-muted max-w-xl mb-6">{s.blurb}</p>

    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
      {featured.map(t=><ToolCard key={t.id} t={t} accent={s.accent}/>)}
    </div>

    {more.length>0 && <div className="mt-6">
      <button onClick={()=>setShowAll(v=>!v)} className="btn btn-ghost px-4 py-2 text-sm">
        {showAll?'Hide':'Show'} more tools ({more.length}) {showAll?'▲':'▼'}</button>
      <p className="text-xs text-faint mt-2">These are here whenever you need them — just less relevant for your stage right now.</p>
      {showAll && <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-4 stagger">
        {more.map(t=><ToolCard key={t.id} t={t} accent={s.accent} dim/>)}

    </div>}
  </Shell>;
}

/* ============================================================
   DASHBOARD — gamified home: level, quests, streak, your products
   ============================================================ */
function Dashboard(){
  const app=useApp();
  const lvl=levelFromXp(app.xp); const base=xpForLevel(lvl), next=xpForLevel(lvl+1);
  const pct=Math.round(((app.xp-base)/(next-base))*100);
  const featuredTools=TOOLS.filter(t=>t.bands.includes(app.band)).slice(0,6);
  const bandLabel=(BANDS.find(b=>b.id===app.band)||{}).label||'';
  return <Shell>
    <div className="grid lg:grid-cols-3 gap-4 mb-4">
      <Card className="lg:col-span-2 relative overflow-hidden">
        <div className="absolute -top-12 -right-12 h-40 w-40 rounded-full blur-3xl opacity-40 bg-grape"/>
        <div className="relative">
          <div className="text-sm text-muted">Welcome back{app.profile.goal?` — chasing: ${app.profile.goal}`:''} {app.demo&&<span className="pill ml-1" style={{background:'rgba(255,194,75,.15)',color:'#FFC24B'}}>Demo</span>}</div>
          <h1 className="font-serif text-3xl mt-1">Level {lvl} · {app.xp} XP</h1>
          <div className="mt-3 max-w-md"><span className="xpbar"><i style={{width:Math.max(6,pct)+'%'}}/></span>
            <div className="text-xs text-muted mt-1">{next-app.xp} XP to level {lvl+1}</div></div>
          <div className="flex flex-wrap gap-2 mt-4">
            <Pill style={{background:'rgba(255,194,75,.15)',color:'#FFC24B'}}>🔥 {app.streak} day streak</Pill>
            <Pill style={{background:'rgba(52,224,161,.15)',color:'#34E0A1'}}>🎚️ {bandLabel} mode</Pill>
            <Pill style={{background:'rgba(124,92,255,.15)',color:'#B9A6FF'}}>🏅 {app.badges} badges</Pill>
          </div>
        </div>
      </Card>
      <Card>
        <div className="font-display font-semibold mb-3">Daily quests</div>
        <div className="space-y-2.5">
          {app.quests.map(q=><button key={q.id} onClick={()=>app.completeQuest(q.id)} disabled={q.done}
            className={cx('w-full flex items-center gap-3 rounded-xl2 border p-3 text-left transition', q.done?'border-mint/40 bg-mint/10':'border-white/10 bg-white/3 hover:border-grape/50')}>
            <span className={cx('grid place-items-center h-7 w-7 rounded-full text-sm', q.done?'bg-mint text-ink':'bg-white/10')}>{q.done?'✓':q.emoji}</span>
            <span className={cx('flex-1 text-sm', q.done&&'line-through text-muted')}>{q.label}</span>
            <span className="text-xs font-semibold text-grape">+{q.xp}</span>
          </button>)}
        </div>
      </Card>

    <div className="flex items-center justify-between mb-3 mt-6">
      <h2 className="font-serif text-2xl">Made for you</h2>
      <button onClick={()=>app.nav('/hub')} className="text-sm text-grape">All products →</button>
    </div>
    <p className="text-sm text-muted mb-4 -mt-2">Leading with what matters at {bandLabel}. Everything else is one tap away in each product.</p>
    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
      {featuredTools.map(t=><ToolCard key={t.id} t={t} accent={SUBS[t.sub].accent}/>)}

        <div className="rounded-xl2 border border-white/8 bg-white/3 p-3"><div className="text-xs text-muted">Badges</div><div className="font-display font-semibold">{app.badges}</div></div>

/* ============================================================
   SHELL + helpers
   ============================================================ */
function Shell({children}){
  return <div><HUD/>
    <main className="max-w-[1180px] mx-auto px-4 sm:px-6 py-6 pb-24">{children}</main>
    <BottomNav/>
  </div>;
}
function BottomNav(){
  const app=useApp(); const [route]=[app.route];
  const items=[['/dashboard','🏠','Home'],['/hub','🧭','Products'],['/sub/leaf','🌿','Learn'],['/profile','😎','You']];
  return <nav className="fixed bottom-0 inset-x-0 z-40 glass">
    <div className="max-w-[1180px] mx-auto flex items-center justify-around px-2 py-2 pb-[max(8px,env(safe-area-inset-bottom))]">
      {items.map(([to,e,l])=>{ const a=route===to; return <button key={to} onClick={()=>app.nav(to)}
        className={cx('flex flex-col items-center gap-0.5 px-4 py-1 rounded-xl', a?'text-cloud':'text-faint')}>
        <span className={cx('text-lg transition', a&&'scale-110')}>{e}</span><span className="text-[10px] font-medium">{l}</span></button>; })}
    </div>
  </nav>;
}
const Empty=({msg})=> <div className="text-center text-muted py-20">{msg}</div>;

/* ============================================================
   APP ROOT
   ============================================================ */
const todayStr=()=> new Date().toISOString().slice(0,10);
const DEFAULT_QUESTS=[
  { id:'q1', emoji:'👀', label:'Check your dashboard', xp:10, done:false },
  { id:'q2', emoji:'📺', label:'Review one subscription', xp:20, done:false },
  { id:'q3', emoji:'📚', label:'Finish a 2-min lesson', xp:25, done:false },
];

function App(){
  const [route,nav]=useHashRoute();
  const persisted=load();
  const [user,setUser]=useState(persisted.user||null);
  const [demo,setDemo]=useState(persisted.demo||false);
  const [onboarded,setOnboarded]=useState(persisted.onboarded||false);
  const [band,setBandState]=useState(persisted.band||'young');
  const [profile,setProfile]=useState(persisted.profile||{name:'',vibe:'',goal:''});
  const [xp,setXp]=useState(persisted.xp||0);
  const [streak,setStreak]=useState(persisted.streak||1);
  const [badges,setBadges]=useState(persisted.badges||0);
  const [quests,setQuests]=useState(persisted.questDay===todayStr()? (persisted.quests||DEFAULT_QUESTS): DEFAULT_QUESTS);
  const [burst,setBurst]=useState(0);

  // streak bump on first load each day
  useEffect(()=>{ const p=load(); const last=p.lastDay; const today=todayStr();
    if(last && last!==today){ const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
      setStreak(s=> last===y ? (s+1) : 1); }
  },[]);

  // persist
  useEffect(()=>{ save({user,demo,onboarded,band,profile,xp,streak,badges,quests,questDay:todayStr(),lastDay:todayStr()}); },
    [user,demo,onboarded,band,profile,xp,streak,badges,quests]);

  const award=useCallback((n)=>{ setXp(x=>x+n); setBurst(b=>b+1); },[]);
  const completeQuest=useCallback((id)=>{ setQuests(qs=>qs.map(q=>{ if(q.id===id&&!q.done){ award(q.xp); return {...q,done:true}; } return q; })); },[award]);
  const completeOnboard=useCallback(({band,vibe,goal})=>{ setBandState(band); setProfile(p=>({...p,vibe,goal})); setOnboarded(true);
    if(!onboarded){ award(50); setBadges(b=>b+1); } },[onboarded,award]);
  const startDemo=useCallback(()=>{ setUser({name:'Demo'}); setDemo(true); setProfile({name:'Demo',vibe:'Just curious',goal:'Learn the basics'}); setBandState('young'); setOnboarded(false); nav('/onboard'); },[nav]);
  const logout=useCallback(()=>{ setUser(null); setDemo(false); setOnboarded(false); setXp(0); setStreak(1); setBadges(0); setQuests(DEFAULT_QUESTS); nav('/'); },[nav]);

  // ensure a user exists once onboarding starts
  useEffect(()=>{ if((route==='/onboard') && !user) setUser({name:''}); },[route,user]);

  const value={ route, nav, user, demo, onboarded, band, setBand:setBandState, profile, setProfile,
    xp, streak, badges, quests, award, completeQuest, completeOnboard, startDemo, logout,
    setOnboarded };

  // route guards (synchronous — no blank-frame flash)
  let view=null;
  const seg=route.split('/').filter(Boolean);
  if(route==='/' ) view=<Landing/>;
  else if(route==='/onboard') view=<Onboarding/>;
  else if(!user){ if(route!=='/'){ location.hash='/'; } view=<Landing/>; }
  else if(!onboarded && route!=='/onboard'){ location.hash='/onboard'; view=<Onboarding/>; }
  else if(route==='/dashboard') view=<Dashboard/>;
  else if(route==='/hub') view=<Hub/>;
  else if(route==='/profile') view=<Profile/>;
  else if(seg[0]==='sub') view=<SubPage subKey={seg[1]}/>;
  else if(seg[0]==='tool') view=<ToolPage toolId={seg[1]}/>;
  else view=<Dashboard/>;

  return <Ctx.Provider value={value}>
    <XPBurst fire={burst}/>
    {view}
  </Ctx.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
